<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📨 テンプレ管理システム</title>
<style>
:root {
  --bg:#EAE8E1; --card:#F8F7F4; --text:#333; --muted:#777;
  --primary:#4D644A; --primary-l:#E9ECE8; --primary-h:#3A4C38;
  --border:#DCD8D0; --border-s:#BDB7AB;
  --accent:#8F4B4B; --accent-l:#F5EDED;
  --r:8px; --rl:12px; --shadow:0 1px 3px rgba(0,0,0,.07);
}
[data-theme="k"] {
  --bg:#EBE1D5; --card:#FFFDF9; --text:#4A3C31; --muted:#8A7B6E;
  --primary:#8D5A3A; --primary-l:#F6EFEA; --primary-h:#6D442A;
  --border:#DBCFBE; --border-s:#BAA993; --accent:#5C665C; --accent-l:#EBF0EB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;}
button{cursor:pointer;font-family:inherit;}
#hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
#hdr h1{font-size:20px;font-weight:700;}
.hdr-r{display:flex;gap:8px;align-items:center;}
.sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:14px;font-weight:600;border:1px solid transparent;transition:all .15s;}
.btn-p{background:var(--primary);color:#fff;} .btn-p:hover{background:var(--primary-h);}
.btn-o{background:var(--card);border-color:var(--border-s);color:var(--text);} .btn-o:hover{background:var(--bg);}
.btn-ghost{background:none;border:none;color:var(--muted);padding:6px 10px;font-size:13px;font-weight:600;} .btn-ghost:hover{color:var(--text);}
.btn-danger{background:none;border:none;color:var(--accent);padding:6px 10px;font-size:13px;font-weight:600;}
#main{max-width:960px;margin:0 auto;padding:32px 20px 100px;}
.section{margin-top:52px;margin-bottom:32px;}
.section-hdr{border-bottom:2px solid var(--border-s);padding-bottom:14px;margin-bottom:16px;}
.section-title{font-size:24px;font-weight:800;}
.folder{margin-bottom:14px;}
.folder-inner{background:var(--card);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.folder-inner.nested{border-left:4px solid var(--primary);margin-left:28px;}
.folder-hdr{padding:14px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.folder-hdr:hover{background:var(--bg);}
.folder-body{padding:16px;background:var(--bg);border-top:1px solid var(--border);}
.tcard{background:var(--card);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:2px;}
.tcard.hilite{border:2px solid var(--primary);box-shadow:0 0 0 4px var(--primary-l);}
.tcard.dragging{opacity:.4;}
.tcard-hdr{padding:13px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.tcard-hdr:hover{background:var(--bg);}
.drag-handle{color:var(--border-s);cursor:grab;font-size:15px;padding:2px 6px;}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid;white-space:nowrap;}
.badge-tpl{background:var(--primary-l);color:var(--primary);border-color:var(--primary);}
.badge-flow{background:var(--accent-l);color:var(--accent);border-color:var(--accent);}
.tcard-title{flex:1;font-size:16px;font-weight:600;}
.tcard-actions{display:flex;gap:4px;}
.tcard-body{padding:0 18px 18px;border-top:1px solid var(--border);}
.lang-tabs{display:flex;gap:8px;padding-top:16px;margin-bottom:14px;align-items:center;}
.ml{margin-left:auto;}
pre.content{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;font-size:15px;line-height:1.9;white-space:pre-wrap;word-break:break-word;font-family:inherit;}
.link-btn{background:var(--card);color:var(--primary);border:1px solid var(--primary);border-radius:6px;padding:3px 8px;margin:0 3px;font-size:13px;font-weight:600;cursor:pointer;}
.link-btn:hover{background:var(--primary-l);}
.edit-form{padding:20px;background:var(--card);border-radius:var(--rl);border:2px solid var(--primary);box-shadow:0 0 0 4px var(--primary-l);}
.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px;}
.form-group.w140{flex:none;width:140px;}
.form-label{font-size:12px;color:var(--muted);font-weight:700;}
.form-input{padding:10px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;width:100%;}
.form-input:focus{outline:none;border-color:var(--primary);}
textarea.form-input{resize:vertical;}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
.flow-area{background:var(--accent-l);border-radius:10px;padding:14px;margin-bottom:14px;}
.flow-label{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:8px;}
.dz{height:10px;border-radius:var(--r);transition:.15s;margin:-3px 0;position:relative;z-index:10;}
.dz.over{height:40px;background:var(--primary-l);border:2px dashed var(--primary);margin:4px 0;display:flex;align-items:center;justify-content:center;}
.dz-label{font-size:12px;color:var(--primary);font-weight:700;display:none;}
.dz.over .dz-label{display:block;}
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px;}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:10px 18px;border-radius:var(--r);font-size:14px;font-weight:600;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:9999;}
#toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div><span style="color:var(--muted);font-weight:600">データを読み込み中...</span></div>
<div id="toast"></div>
<div id="hdr">
  <h1>📨 テンプレ管理システム</h1>
  <div class="hdr-r">
    <div class="sync" id="sync-ind" style="display:none"><div class="sync-dot"></div>同期中</div>
    <button class="btn btn-o" id="theme-btn">🎨 テーマ</button>
  </div>
</div>
<div id="main"></div>

<script>
const SUPABASE_URL = 'https://shsowsyuvqwfvodnblhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoc293c3l1dnF3ZnZvZG5ibGhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxOTMwMjIsImV4cCI6MjA2NDc2OTAyMn0.eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9';

const INIT_CATS = [
  {name:"📝 予約〜チェックイン前",parent:null,type:"section"},
  {name:"予約前",parent:"📝 予約〜チェックイン前",type:"folder"},
  {name:"マニュアル未読",parent:"📝 予約〜チェックイン前",type:"folder"},
  {name:"URLが見れない",parent:"📝 予約〜チェックイン前",type:"folder"},
];

// =====================
// Supabase REST API
// =====================
async function sbGet(key) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${key}&select=value`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
  });
  const d = await r.json();
  return d.length > 0 ? d[0].value : null;
}

async function sbSet(key, value) {
  await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${key}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    },
    body: JSON.stringify({value, updated_at: new Date().toISOString()})
  });
}

// =====================
// 状態管理
// =====================
const state = {
  cats: [], tpls: [],
  theme: localStorage.getItem('theme') || '',
  openCards: new Set(),
  openFolders: {},
  editingId: null,
  _editBuf: null,
  _hilite: null,
  dragging: null,
  langMap: {},
  // 自分が今操作中かどうか
  isBusy: false,
};

// 最後にサーバーから取得したデータのハッシュ
let serverCatsHash = '';
let serverTplsHash = '';

function setBusy(val) { state.isBusy = val; }

function showSync(on) {
  document.getElementById('sync-ind').style.display = on ? 'flex' : 'none';
}

async function saveCats() {
  showSync(true);
  serverCatsHash = JSON.stringify(state.cats);
  await sbSet('categories', state.cats);
  showSync(false);
}

async function saveTpls() {
  showSync(true);
  serverTplsHash = JSON.stringify(state.tpls);
  await sbSet('templates', state.tpls);
  showSync(false);
}

// =====================
// 他ユーザーの変更を30秒ごとにチェック
// 編集中・保存中はスキップ
// =====================
function startPolling() {
  setInterval(async () => {
    if (state.isBusy || state.editingId !== null || state.dragging !== null) return;
    try {
      const [cats, tpls] = await Promise.all([sbGet('categories'), sbGet('templates')]);
      const ch = JSON.stringify(cats);
      const th = JSON.stringify(tpls);
      let changed = false;
      if (ch !== serverCatsHash && ch !== JSON.stringify(state.cats)) {
        state.cats = Array.isArray(cats) && cats.length > 0 ? cats : state.cats;
        serverCatsHash = ch;
        changed = true;
      }
      if (th !== serverTplsHash && th !== JSON.stringify(state.tpls)) {
        state.tpls = Array.isArray(tpls) ? tpls : state.tpls;
        serverTplsHash = th;
        changed = true;
      }
      if (changed) { render(); toast('他のユーザーの変更を反映しました'); }
    } catch(e) {}
  }, 30000);
}

// =====================
// ユーティリティ
// =====================
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function h(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function renderText(text, onLink) {
  const frag = document.createDocumentFragment();
  if (!text) return frag;
  text.split(/\[リンク:(\d+)\]/g).forEach((part, i) => {
    if (i % 2 === 1) {
      const id = Number(part);
      const t = state.tpls.find(x => x.id === id);
      frag.appendChild(h('button', {'class':'link-btn', 'onClick': () => onLink(id)}, '🔗 ' + (t ? t.title : `ID:${id}`)));
    } else if (part) {
      frag.appendChild(document.createTextNode(part));
    }
  });
  return frag;
}

function makeDropZone(label, onDrop) {
  const dz = h('div', {'class':'dz'}, h('span', {'class':'dz-label'}, label));
  dz.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', e => { e.stopPropagation(); dz.classList.remove('over'); });
  dz.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); dz.classList.remove('over'); if (state.dragging) onDrop(state.dragging); });
  return dz;
}

function hiliteCard(id) {
  state._hilite = id;
  state.openCards.add(id);
  render();
  setTimeout(() => { document.getElementById('c'+id)?.scrollIntoView({behavior:'smooth',block:'center'}); }, 50);
  setTimeout(() => { state._hilite = null; render(); }, 2200);
}

async function moveTpl(drag, targetId, targetCat) {
  if (drag.type !== 'tpl') return;
  setBusy(true);
  const dragId = drag.id;
  const item = state.tpls.find(t => t.id === dragId);
  if (!item) { setBusy(false); return; }
  const oldCat = item.category;
  const rest = state.tpls.filter(t => t.id !== dragId);
  const tgtItems = rest.filter(t => t.category === targetCat).sort((a,b) => (a.order||0)-(b.order||0));
  const moved = {...item, category: targetCat};
  if (targetId !== null) {
    const i = tgtItems.findIndex(t => t.id === targetId);
    tgtItems.splice(i !== -1 ? i : tgtItems.length, 0, moved);
  } else tgtItems.push(moved);
  tgtItems.forEach((t, i) => t.order = i + 1);
  let srcItems = [];
  if (oldCat !== targetCat) {
    srcItems = rest.filter(t => t.category === oldCat).sort((a,b) => (a.order||0)-(b.order||0));
    srcItems.forEach((t, i) => t.order = i + 1);
  }
  state.tpls = [...rest.filter(t => t.category !== targetCat && t.category !== oldCat), ...tgtItems, ...srcItems];
  render();
  await saveTpls();
  setBusy(false);
}

// =====================
// テンプレカード
// =====================
function makeCard(t) {
  const isFlow = t.itemType === '流れ';
  const isOpen = state.openCards.has(t.id);
  const isEditing = state.editingId === t.id;
  const lang = state.langMap[t.id] || 'ja';
  const isHilite = state._hilite === t.id;
  const card = h('div', {'class':'tcard'+(isHilite?' hilite':''), 'id':'c'+t.id});

  if (isEditing) {
    const ed = state._editBuf || {...t};
    state._editBuf = ed;
    const titleInput = h('input', {'class':'form-input','type':'text'});
    titleInput.value = ed.title || '';
    titleInput.addEventListener('input', () => ed.title = titleInput.value);
    const typeSelect = h('select', {'class':'form-input'});
    ['テンプレ','流れ'].forEach(v => { const o = h('option',{'value':v},v); if(ed.itemType===v) o.selected=true; typeSelect.appendChild(o); });
    typeSelect.addEventListener('change', () => { ed.itemType = typeSelect.value; state._editBuf = ed; render(); });
    const jaArea = h('textarea', {'class':'form-input','style':{height:'160px'}});
    jaArea.value = ed.ja || '';
    jaArea.addEventListener('input', () => ed.ja = jaArea.value);
    const enArea = h('textarea', {'class':'form-input','style':{height:'120px'}});
    enArea.value = ed.en || '';
    enArea.addEventListener('input', () => ed.en = enArea.value);
    const flowArea = h('textarea', {'class':'form-input','style':{height:'180px'}});
    flowArea.value = ed.flow || '';
    flowArea.addEventListener('input', () => ed.flow = flowArea.value);
    const isFlowEdit = ed.itemType === '流れ';
    card.appendChild(h('div', {'class':'edit-form'},
      h('div', {'class':'form-row'},
        h('div', {'class':'form-group'}, h('label',{'class':'form-label'},'タイトル'), titleInput),
        h('div', {'class':'form-group w140'}, h('label',{'class':'form-label'},'タイプ'), typeSelect),
      ),
      ...(isFlowEdit
        ? [h('div',{'class':'flow-area'},h('div',{'class':'flow-label'},'📋 対応の流れ・社内マニュアル'),flowArea)]
        : [h('div',{'class':'form-group','style':{marginBottom:'12px'}},h('label',{'class':'form-label'},'🇯🇵 日本語'),jaArea),
           h('div',{'class':'form-group','style':{marginBottom:'14px'}},h('label',{'class':'form-label'},'🇬🇧 English'),enArea)]
      ),
      h('div', {'class':'form-actions'},
        h('button', {'class':'btn btn-o', 'onClick': () => {
          // 新規追加でキャンセルした場合は削除
          const exists = state.tpls.find(x => x.id === ed.id && (x.ja || x.en || x.flow || x.title !== '新規アイテム'));
          if (!exists && ed.title === '新規アイテム') {
            state.tpls = state.tpls.filter(x => x.id !== ed.id);
            saveTpls();
          }
          state.editingId = null; state._editBuf = null; setBusy(false); render();
        }}, 'キャンセル'),
        h('button', {'class':'btn btn-p', 'onClick': async () => {
          setBusy(true);
          const idx = state.tpls.findIndex(x => x.id === ed.id);
          if (idx !== -1) state.tpls[idx] = {...ed}; else state.tpls.push({...ed});
          state.editingId = null; state._editBuf = null;
          render();
          await saveTpls();
          setBusy(false);
          toast('保存しました ✓');
        }}, '保存する'),
      )
    ));
    return card;
  }

  const hdr = h('div', {'class':'tcard-hdr'});
  const handle = h('span', {'class':'drag-handle'}, '☰');
  handle.draggable = true;
  handle.addEventListener('dragstart', e => {
    state.dragging = {type:'tpl', id:t.id, cat:t.category};
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
    e.stopPropagation();
  });
  handle.addEventListener('dragend', () => { card.classList.remove('dragging'); state.dragging = null; });
  hdr.appendChild(handle);
  hdr.appendChild(h('span', {'class':'badge '+(isFlow?'badge-flow':'badge-tpl')}, t.itemType||'テンプレ'));
  hdr.appendChild(h('span', {'class':'tcard-title'}, t.title||'無題'));
  hdr.appendChild(h('div', {'class':'tcard-actions'},
    h('button', {'class':'btn-ghost', 'onClick': e => { e.stopPropagation(); setBusy(true); state.editingId=t.id; state._editBuf={...t}; render(); }}, '✏️ 編集'),
    h('button', {'class':'btn-danger', 'onClick': e => { e.stopPropagation(); if(confirm('削除しますか？')){ setBusy(true); state.tpls=state.tpls.filter(x=>x.id!==t.id); render(); saveTpls().then(()=>setBusy(false)); }}}, '🗑️'),
  ));
  hdr.addEventListener('click', () => { isOpen ? state.openCards.delete(t.id) : state.openCards.add(t.id); render(); });
  card.appendChild(hdr);

  if (isOpen) {
    const body = h('div', {'class':'tcard-body'});
    if (isFlow) {
      const pre = h('pre', {'class':'content'});
      pre.appendChild(renderText(t.flow||'', hiliteCard));
      body.appendChild(h('div', {'style':{paddingTop:'14px'}}, pre));
    } else {
      const cur = lang==='ja' ? (t.ja||'') : (t.en||'');
      const tabs = h('div', {'class':'lang-tabs'},
        h('button', {'class':'btn '+(lang==='ja'?'btn-p':'btn-o'), 'onClick':()=>{state.langMap[t.id]='ja';render();}}, '🇯🇵 日本語'),
        h('button', {'class':'btn '+(lang==='en'?'btn-p':'btn-o'), 'onClick':()=>{state.langMap[t.id]='en';render();}}, '🇬🇧 English'),
        h('button', {'class':'btn btn-o ml', 'onClick': () => { if(cur) navigator.clipboard.writeText(cur).then(()=>toast('コピーしました ✓')); }, 'disabled': !cur ? '' : null}, cur?'📋 コピー':'空です'),
      );
      const pre = h('pre', {'class':'content'});
      pre.appendChild(renderText(cur, hiliteCard));
      body.appendChild(tabs);
      body.appendChild(pre);
    }
    card.appendChild(body);
  }
  return card;
}

// =====================
// フォルダ
// =====================
function makeFolder(cat) {
  const nm = cat.name;
  const children = state.cats.filter(c => c.parent === nm);
  const items = state.tpls.filter(t => t.category === nm).sort((a,b) => (a.order||0)-(b.order||0));
  const isOpen = state.openFolders[nm] !== false;

  const doDrop = (drag, targetId=null) => { if(drag) moveTpl(drag, targetId, nm); };

  if (cat.type === 'section') {
    const sec = h('div', {'class':'section'});
    const shdr = h('div', {'class':'section-hdr'}, h('div', {'class':'section-title'}, nm));
    shdr.addEventListener('dragover', e => e.preventDefault());
    shdr.addEventListener('drop', e => { e.preventDefault(); doDrop(state.dragging); });
    sec.appendChild(shdr);
    const body = h('div', {'style':{paddingLeft:'8px'}});
    children.forEach(c => body.appendChild(makeFolder(c)));
    items.forEach(t => {
      body.appendChild(makeDropZone('ここに挿入', d => doDrop(d, t.id)));
      body.appendChild(makeCard(t));
    });
    body.appendChild(makeDropZone(`${nm}の末尾に追加`, d => doDrop(d)));
    sec.appendChild(body);
    return sec;
  }

  const wrap = h('div', {'class':'folder'});
  const inner = h('div', {'class':'folder-inner'+(cat.parent?' nested':'')});
  const fhdr = h('div', {'class':'folder-hdr'});
  fhdr.addEventListener('dragover', e => e.preventDefault());
  fhdr.addEventListener('drop', e => { e.preventDefault(); doDrop(state.dragging); state.openFolders[nm]=true; });
  fhdr.appendChild(h('span', {'style':{color:'var(--muted)',fontSize:'13px',width:'16px'}}, isOpen?'▼':'▶'));
  fhdr.appendChild(h('span', {}, '📂'));
  fhdr.appendChild(h('span', {'style':{flex:'1',fontWeight:'700',fontSize:'16px',marginLeft:'6px'}}, nm));
  const addBtn = h('button', {'class':'btn btn-p', 'onClick': async e => {
    e.stopPropagation();
    setBusy(true);
    const id = Date.now();
    const newT = {id, title:'新規アイテム', category:nm, itemType:'テンプレ', order:999, ja:'', en:'', flow:''};
    state.tpls.push(newT);
    state.openFolders[nm] = true;
    state.editingId = id;
    state._editBuf = newT;
    render();
    await saveTpls();
  }}, '➕ 追加');
  fhdr.appendChild(addBtn);
  fhdr.addEventListener('click', e => {
    if (e.target === addBtn || addBtn.contains(e.target)) return;
    state.openFolders[nm] = !isOpen; render();
  });
  inner.appendChild(fhdr);

  if (isOpen) {
    const fbody = h('div', {'class':'folder-body'});
    children.forEach(c => fbody.appendChild(makeFolder(c)));
    items.forEach(t => {
      fbody.appendChild(makeDropZone('ここに挿入', d => doDrop(d, t.id)));
      fbody.appendChild(makeCard(t));
    });
    if (children.length > 0 || items.length > 0) {
      fbody.appendChild(makeDropZone(`${nm}の末尾に追加`, d => doDrop(d)));
    }
    inner.appendChild(fbody);
  }
  wrap.appendChild(inner);
  return wrap;
}

// =====================
// レンダリング
// =====================
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  state.cats.filter(c => !c.parent).forEach(c => main.appendChild(makeFolder(c)));
}

// =====================
// 初期化
// =====================
async function init() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('theme-btn').addEventListener('click', () => {
    state.theme = state.theme === 'k' ? '' : 'k';
    localStorage.setItem('theme', state.theme);
    document.documentElement.setAttribute('data-theme', state.theme);
  });

  try {
    const [cats, tpls] = await Promise.all([sbGet('categories'), sbGet('templates')]);
    state.cats = Array.isArray(cats) && cats.length > 0 ? cats : JSON.parse(JSON.stringify(INIT_CATS));
    state.tpls = Array.isArray(tpls) ? tpls : [];
    serverCatsHash = JSON.stringify(state.cats);
    serverTplsHash = JSON.stringify(state.tpls);
    state.cats.forEach(c => { if (state.openFolders[c.name] === undefined) state.openFolders[c.name] = true; });
  } catch(e) {
    state.cats = JSON.parse(JSON.stringify(INIT_CATS));
    state.tpls = [];
    toast('読み込みエラー。再読み込みしてください。');
  }

  document.getElementById('overlay').style.display = 'none';
  render();
  startPolling();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
