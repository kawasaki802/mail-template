<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールテンプレート管理システム（エラー対策・バッジ復旧版）</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-color: #EAE8E1;
      --card-bg: #F8F7F4;
      --text-main: #333333;
      --text-muted: #666666;
      --primary: #4D644A;
      --primary-hover: #3A4C38;
      --primary-light: #E9ECE8;
      --border: #DCD8D0;
      --border-strong: #BDB7AB;
      --accent: #8F4B4B;
      --accent-light: #F5EDED;
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.08);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    [data-theme="kakishibu"] {
      --bg-color: #EBE1D5; --card-bg: #FFFDF9; --text-main: #4A3C31; --text-muted: #8A7B6E;
      --primary: #8D5A3A; --primary-hover: #6D442A; --primary-light: #F6EFEA;
      --border: #DBCFBE; --border-strong: #BAA993; --accent: #5C665C; --accent-light: #EBF0EB;
    }
    
    body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; transition: background-color 0.3s ease; }
    .app-header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 16px 28px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
    .app-title { margin: 0; font-size: 22px; font-weight: 700; }
    .search-input { width: 100%; padding: 12px 18px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 16px; outline: none; box-sizing: border-box; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: var(--card-bg); border-color: var(--border-strong); color: var(--text-main); }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 14px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-danger-ghost { background: transparent; color: var(--accent); padding: 8px 14px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .form-label { display: block; font-size: 13px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--card-bg); color: var(--text-main); font-size: 16px; box-sizing: border-box; }
    .card { background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-bottom: 0px; overflow: hidden; }
    .card-target { border: 2px solid var(--primary); box-shadow: 0 0 0 5px var(--primary-light); }
    .card-header { padding: 16px 24px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
    .card-body { padding: 0 24px 24px; border-top: 1px solid var(--border); }
    .drag-handle { color: var(--border-strong); cursor: grab; font-size: 18px; padding: 4px; user-select: none; }
    .badge { padding: 6px 16px; border-radius: 24px; font-size: 13px; font-weight: 700; white-space: nowrap; user-select: none; border: 1px solid; }
    .badge-template { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .badge-flow { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
    .badge-platform { border: none; color: #fff; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--border-strong); padding-bottom: 16px; margin-bottom: 16px; cursor: grab; }
    .section-title { font-size: 26px; font-weight: 800; color: var(--text-main); }
    .link-btn { background: var(--card-bg); color: var(--primary); border: 1px solid var(--primary); border-radius: 6px; padding: 4px 10px; margin: 0 4px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .pre-area { background: var(--bg-color); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; font-size: 16px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; color: var(--text-main); margin: 0; font-family: inherit; }
    .drop-zone { height: 16px; background: transparent; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; margin: -6px 0; position: relative; z-index: 10; }
    .drop-zone.active { height: 44px; background: var(--primary-light); border: 2px dashed var(--primary); margin: 4px 0; }
    .drop-zone-text { font-size: 13px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>
  <div id="root">
    <div style="text-align: center; margin-top: 150px; color: #7A7A7A;">
      <h2 style="font-size: 20px;">⚙️ システムを起動しています...（数秒お待ちください）</h2>
    </div>
  </div>

  <script type="text/babel">
    // ★ ここが一番怪しい部分です。以前のコードで違う設定が入っていませんでしたか？
    const firebaseConfig = {
      apiKey: "AIzaSyBZ7v3kRjAsOGwYdUX_w0FKoGPLUhbR1VQ",
      authDomain: "mail-template-68598.firebaseapp.com",
      projectId: "mail-template-68598",
      storageBucket: "mail-template-68598.firebasestorage.app",
      messagingSenderId: "475374524236",
      appId: "1:475374524236:web:b39a70aebc72bb4172e1e9"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const { useState, useMemo, useEffect } = React;

    const INITIAL_CATEGORIES = [
      { name: "📝 予約〜チェックイン前", parent: null, type: "section" },
      { name: "予約前", parent: "📝 予約〜チェックイン前", type: "folder" },
      { name: "マニュアル未読", parent: "📝 予約〜チェックイン前", type: "folder" },
      { name: "URLが見れない", parent: "📝 予約〜チェックイン前", type: "folder" }
    ];

    function CopyBtn({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); }); };
      if (!text) return <button className="btn btn-outline" style={{opacity: 0.5}} disabled>空です</button>;
      return <button onClick={copy} className={`btn ${copied ? 'btn-primary' : 'btn-outline'}`}>{copied ? "✓ コピーしました" : "📋 コピー"}</button>;
    }

    function DropZone({ onDrop, label }) {
      const [isOver, setIsOver] = useState(false);
      return (
        <div className={`drop-zone ${isOver ? 'active' : ''}`} onDragOver={e => { e.preventDefault(); e.stopPropagation(); setIsOver(true); }} onDragLeave={e => { e.stopPropagation(); setIsOver(false); }} onDrop={e => { e.preventDefault(); e.stopPropagation(); setIsOver(false); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); onDrop(data); } catch(err){} }}>
          {isOver && <span className="drop-zone-text">{label || "ここに挿入"}</span>}
        </div>
      );
    }

    function LinkableText({ text, allTemplates, onLinkClick }) {
      if (!text) return null;
      const regex = /\[リンク:(\d+)\]/g;
      if (!regex.test(text)) return <React.Fragment>{text}</React.Fragment>;
      const parts = text.split(/\[リンク:(\d+)\]/g);
      return (
        <React.Fragment>
          {parts.map((part, index) => {
            if (index % 2 === 1) {
              const targetId = Number(part);
              const targetTemplate = allTemplates.find(t => t.id === targetId);
              const title = targetTemplate ? targetTemplate.title : `不明ID:${targetId}`;
              return <button key={index} className="link-btn" onClick={() => onLinkClick(targetId)}>🔗 {title}</button>;
            }
            return <span key={index}>{part}</span>;
          })}
        </React.Fragment>
      );
    }

    // ★ プラットフォーム（Airbnbなど）の色分け設定
    const getPlatformColor = (platform) => {
      if (!platform) return "transparent";
      if (platform.includes("Airbnb")) return "#FF5A5F";
      if (platform.includes("Agoda") || platform.includes("Booking")) return "#4A90E2";
      if (platform.includes("共通")) return "#5C8C73";
      return "#888888"; // その他
    };

    function TemplateCard({ t, categories, allTemplates, onUpdate, onDelete, onLinkClick, forceOpenId }) {
      const [open, setOpen] = useState(false);
      const [lang, setLang] = useState("ja"); 
      const [isEditing, setIsEditing] = useState(false);
      const [editData, setEditData] = useState({ ...t });

      const viewMode = t.itemType === "流れ" ? "flow" : "text";

      useEffect(() => { if (forceOpenId === t.id) { setOpen(true); } }, [forceOpenId, t.id]);
      useEffect(() => { if (viewMode === "flow") { setLang("flow"); } else if (lang === "flow") { setLang("ja"); } }, [viewMode]);

      const currentText = lang === "ja" ? t.ja : lang === "en" ? t.en : t.flow;

      const handleSave = () => { onUpdate(editData); setIsEditing(false); };
      const handleDragStart = (e) => { if (isEditing) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", JSON.stringify({ type: "template", id: t.id, currentCategory: t.category })); e.stopPropagation(); e.currentTarget.style.opacity = "0.4"; };

      if (isEditing) {
        return (
          <div className="card card-target" style={{ padding: "24px" }}>
            <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
              <div style={{ flex: 2, minWidth: "200px" }}>
                <label className="form-label">タイトル</label>
                <input type="text" className="form-control" value={editData.title} onChange={e => setEditData({...editData, title: e.target.value})} />
              </div>
              <div style={{ width: "160px" }}>
                <label className="form-label">対応サイト (任意)</label>
                <input type="text" className="form-control" placeholder="Airbnb, 共通 など" value={editData.platform || ""} onChange={e => setEditData({...editData, platform: e.target.value})} />
              </div>
              <div style={{ width: "140px" }}>
                <label className="form-label">項目タイプ</label>
                <select className="form-control" value={editData.itemType || "テンプレ"} onChange={e => setEditData({...editData, itemType: e.target.value})}>
                  <option value="テンプレ">テンプレ</option><option value="流れ">流れ</option>
                </select>
              </div>
            </div>
            
            {(editData.itemType === "テンプレ" || !editData.itemType) && (
              <React.Fragment>
                <div style={{ marginBottom: 20 }}><label className="form-label">🇯🇵 日本語</label><textarea className="form-control" value={editData.ja || ""} onChange={e => setEditData({...editData, ja: e.target.value})} style={{ height: "180px" }} /></div>
                <div style={{ marginBottom: 24 }}><label className="form-label">🇬🇧 English</label><textarea className="form-control" value={editData.en || ""} onChange={e => setEditData({...editData, en: e.target.value})} style={{ height: "140px" }} /></div>
              </React.Fragment>
            )}

            {editData.itemType === "流れ" && (
              <div style={{ marginBottom: 28, background: "var(--accent-light)", padding: "20px", borderRadius: "12px" }}>
                <label className="form-label" style={{ color: "var(--accent)" }}>📋 対応の流れ・社内マニュアル</label>
                <textarea className="form-control" value={editData.flow || ""} onChange={e => setEditData({...editData, flow: e.target.value})} style={{ height: "200px" }} />
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "flex-end", gap: 14 }}>
              <button className="btn btn-outline" onClick={() => setIsEditing(false)}>キャンセル</button>
              <button className="btn btn-primary" onClick={handleSave}>保存する</button>
            </div>
          </div>
        );
      }

      return (
        <div id={`file-card-${t.id}`} className={`card ${forceOpenId === t.id ? 'card-target' : ''}`} draggable onDragStart={handleDragStart} onDragEnd={e => e.currentTarget.style.opacity = "1"}>
          <div className="card-header" onClick={() => setOpen(!open)}>
            <span className="drag-handle">☰</span>
            {/* ★ 復活したプラットフォームバッジ */}
            {t.platform && (
              <span className="badge badge-platform" style={{ backgroundColor: getPlatformColor(t.platform) }}>{t.platform}</span>
            )}
            <span className={`badge ${t.itemType === '流れ' ? 'badge-flow' : 'badge-template'}`}>{t.itemType || "テンプレ"}</span>
            <span style={{ fontWeight: 600, fontSize: "17px", flex: 1 }}>{t.title}</span>
            <div style={{ display: "flex", gap: 8 }} onClick={e => e.stopPropagation()}>
              <button className="btn btn-ghost" onClick={() => { setEditData({...t}); setIsEditing(true); setOpen(true); }}>✏️ 編集</button>
              <button className="btn btn-danger-ghost" onClick={() => { if(confirm("削除しますか？")) onDelete(t.id); }}>🗑️ 削除</button>
            </div>
          </div>

          {open && (
            <div className="card-body">
              {viewMode === "flow" ? (
                <div style={{ paddingTop: "18px" }}>
                  <pre className="pre-area flow-area"><LinkableText text={t.flow} allTemplates={allTemplates} onLinkClick={onLinkClick} /></pre>
                </div>
              ) : (
                <div style={{ paddingTop: "18px" }}>
                  <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
                    <button onClick={() => setLang("ja")} className={`btn ${lang === "ja" ? "btn-primary" : "btn-outline"}`}>🇯🇵 日本語</button>
                    <button onClick={() => setLang("en")} className={`btn ${lang === "en" ? "btn-primary" : "btn-outline"}`}>🇬🇧 English</button>
                    <div style={{ marginLeft: "auto" }}><CopyBtn text={currentText} /></div>
                  </div>
                  <pre className="pre-area"><LinkableText text={currentText} allTemplates={allTemplates} onLinkClick={onLinkClick} /></pre>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function FolderSection({ catObj, categories, templates, allTemplates, onMoveFolder, onReorderCategory, onRenameCat, onDeleteCat, onAddTemplate, onUpdateTemplate, onDeleteTemplate, onLinkClick, forceOpenId, onInsertTemplate, level = 0 }) {
      const catName = catObj.name;
      const [isOpen, setIsOpen] = useState(false);
      const childFolders = categories.filter(c => c.parent === catName);
      const childTemplates = useMemo(() => templates.filter(t => t.category === catName).sort((a, b) => (a.order || 0) - (b.order || 0)), [templates, catName]);

      const handleSectionDrop = (e) => { e.preventDefault(); e.stopPropagation(); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); if (data.type === "template") { onInsertTemplate(data.id, null, catName); setIsOpen(true); } else if (data.type === "category" && data.name !== catName) { onMoveFolder(data.name, catName); setIsOpen(true); } } catch(err){} };

      if (catObj.type === "section") {
        return (
          <div style={{ marginTop: 60, marginBottom: 36 }}>
            <DropZone onDrop={(data) => { if(data.type === 'category') onReorderCategory(data.name, catName); }} label="セクションを上に移動" />
            <div className="section-header" draggable onDragStart={e => e.dataTransfer.setData("text/plain", JSON.stringify({ type: "category", name: catName }))} onDragOver={e => e.preventDefault()} onDrop={handleSectionDrop}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}><span className="drag-handle">☰</span><span className="section-title">{catName}</span></div>
            </div>
            <div style={{ paddingLeft: "12px" }}>
              {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} allTemplates={allTemplates} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} onInsertTemplate={onInsertTemplate} level={level + 1} />)}
              {childTemplates.map(t => ( <React.Fragment key={t.id}><DropZone onDrop={(data) => { if (data.type === 'template') onInsertTemplate(data.id, t.id, catName); }} label="ここに挿入" /><TemplateCard t={t} categories={categories} allTemplates={allTemplates} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} /></React.Fragment> ))}
              <DropZone onDrop={(data) => { if(data.type === 'template') onInsertTemplate(data.id, null, catName); }} label={`${catName} の一番下に追加`} />
            </div>
          </div>
        );
      }

      return (
        <div style={{ marginBottom: 18, marginLeft: level > 0 ? "36px" : "0" }}>
          <DropZone onDrop={(data) => { if(data.type === 'category') onReorderCategory(data.name, catName); }} label="上に移動" />
          <div className="card" style={{ borderLeft: level > 0 ? "5px solid var(--primary)" : "1px solid var(--border)", marginBottom: 0 }}>
            <div className="card-header" draggable onDragStart={e => e.dataTransfer.setData("text/plain", JSON.stringify({ type: "category", name: catName }))} onDragOver={e => e.preventDefault()} onDrop={handleSectionDrop} onClick={() => setIsOpen(!isOpen)}>
              <span style={{ fontSize: 16, color: "var(--text-muted)", marginRight: 10 }}>{isOpen ? "▼" : "▶"}</span><span style={{ fontSize: 22, marginRight: 8 }}>📂</span><span style={{ fontSize: 17, fontWeight: 700, flex: 1 }}>{catName}</span>
              <div style={{ display: "flex", gap: 10 }} onClick={e => e.stopPropagation()}>
                <button className="btn btn-primary" onClick={() => { onAddTemplate(catName); setIsOpen(true); }}>➕ 追加</button>
              </div>
            </div>
            {isOpen && (
              <div className="card-body" style={{ background: "var(--bg-color)", paddingTop: "24px" }}>
                {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} allTemplates={allTemplates} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} onInsertTemplate={onInsertTemplate} level={level + 1} />)}
                {childTemplates.map(t => ( <React.Fragment key={t.id}><DropZone onDrop={(data) => { if (data.type === 'template') onInsertTemplate(data.id, t.id, catName); }} label="ここに挿入" /><TemplateCard t={t} categories={categories} allTemplates={allTemplates} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} /></React.Fragment> ))}
                {(childFolders.length > 0 || childTemplates.length > 0) && <DropZone onDrop={(data) => { if(data.type === 'template') onInsertTemplate(data.id, null, catName); }} label={`${catName} の一番下に追加`} />}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [categories, setCategories] = useState(null); 
      const [templates, setTemplates] = useState(null);
      const [errorMsg, setErrorMsg] = useState("");
      
      const [theme, setTheme] = useState(localStorage.getItem('app_theme') || 'matcha');
      useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('app_theme', theme); }, [theme]);

      // ★ データ取得部（エラーを検知して画面に出すように改修）
      useEffect(() => {
        try {
          const unsubCat = db.collection('mailApp').doc('categories').onSnapshot(doc => {
            if (doc.exists) {
              const d = doc.data();
              setCategories(d.data || d.categories || INITIAL_CATEGORIES);
            } else {
              setCategories(INITIAL_CATEGORIES);
            }
          }, err => {
            console.error(err);
            setErrorMsg(`カテゴリデータの取得に失敗しました。\n詳細: ${err.message}`);
          });

          const unsubTemp = db.collection('mailTemplates').onSnapshot(snap => {
            if (snap.empty) {
              setTemplates([]);
            } else {
              setTemplates(snap.docs.map(doc => doc.data()));
            }
          }, err => {
            console.error(err);
            setErrorMsg(`テンプレートデータの取得に失敗しました。\n詳細: ${err.message}`);
          });

          return () => { unsubCat(); unsubTemp(); };
        } catch (err) {
          setErrorMsg(`システムの起動に失敗しました。\n詳細: ${err.message}`);
        }
      }, []);

      const updateCats = (newCats) => db.collection('mailApp').doc('categories').set({ data: newCats });
      const handleUpdateTemplate = (updatedT) => db.collection('mailTemplates').doc(updatedT.id.toString()).set(updatedT);
      const handleDeleteTemplate = (id) => db.collection('mailTemplates').doc(id.toString()).delete();

      const handleInsertTemplate = (draggedId, targetId, targetCategory) => {
        const draggedFile = templates.find(t => t.id === draggedId);
        if (!draggedFile) return;
        let targetCategoryFiles = templates.filter(t => t.category === targetCategory && t.id !== draggedId).sort((a, b) => (a.order || 0) - (b.order || 0));
        if (targetId) {
          const targetIndex = targetCategoryFiles.findIndex(t => t.id === targetId);
          if (targetIndex !== -1) { targetCategoryFiles.splice(targetIndex, 0, draggedFile); } else { targetCategoryFiles.push(draggedFile); }
        } else {
          targetCategoryFiles.push(draggedFile);
        }

        const batch = db.batch();
        targetCategoryFiles.forEach((file, index) => {
          const fileRef = db.collection('mailTemplates').doc(file.id.toString());
          batch.update(fileRef, { category: targetCategory, order: index + 1 });
        });
        if (draggedFile.category !== targetCategory) {
          const sourceCategoryFiles = templates.filter(t => t.category === draggedFile.category && t.id !== draggedId).sort((a, b) => (a.order || 0) - (b.order || 0));
          sourceCategoryFiles.forEach((file, index) => {
            const fileRef = db.collection('mailTemplates').doc(file.id.toString());
            batch.update(fileRef, { order: index + 1 });
          });
        }
        batch.commit().catch(err => console.error(err));
      };

      // 🔴 エラーが発生した場合の画面
      if (errorMsg) {
        return (
          <div style={{ textAlign: "center", marginTop: "100px", padding: "20px" }}>
            <h2 style={{ color: "#EF4444" }}>⚠️ データベースへの接続エラー</h2>
            <pre style={{ color: "var(--accent)", background: "var(--accent-light)", padding: "16px", borderRadius: "8px", display: "inline-block", textAlign: "left" }}>{errorMsg}</pre>
            <div style={{ marginTop: "30px", fontSize: "15px", color: "var(--text-main)", lineHeight: 1.6 }}>
              <p>前回のアップデートの際、<strong>元のアプリにあった「Firebaseの接続設定（firebaseConfig）」</strong>を上書きして消してしまった可能性があります。</p>
              <p>お手数ですが、一番最初に使っていた古いバージョンのコードはお手元にございますでしょうか？</p>
            </div>
          </div>
        );
      }

      // ⏳ ロード中の画面（ここから進まない場合は上のエラーキャッチに引っかかっています）
      if (!categories || !templates) {
        return (
          <div style={{ textAlign: "center", marginTop: "150px" }}>
            <h2 style={{ color: "var(--text-muted)", fontSize: "20px" }}>⏳ データベースから情報を取得しています...</h2>
          </div>
        );
      }

      const rootFolders = categories.filter(c => c.parent === null);

      return (
        <div>
          <header className="app-header">
            <div style={{ maxWidth: 1000, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h1 className="app-title">📨 テンプレ管理システム</h1>
              <button className="btn btn-outline" onClick={() => setTheme(theme === 'matcha' ? 'kakishibu' : 'matcha')}>🎨 テーマ切替</button>
            </div>
          </header>
          <main style={{ maxWidth: 1000, margin: "0 auto", padding: "40px 24px 100px" }}>
            {rootFolders.map(cat => (
              <FolderSection key={cat.name} catObj={cat} categories={categories} templates={templates} allTemplates={templates} onMoveFolder={()=>{}} onReorderCategory={()=>{}} onRenameCat={()=>{}} onDeleteCat={()=>{}} onAddTemplate={()=>{}} onUpdateTemplate={handleUpdateTemplate} onDeleteTemplate={handleDeleteTemplate} onLinkClick={()=>{}} forceOpenId={null} onInsertTemplate={handleInsertTemplate} level={0} />
            ))}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
