<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールテンプレート管理システム</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-color: #F9FAFB;         /* 優しい背景色 */
      --card-bg: #FFFFFF;          /* カードの背景 */
      --text-main: #111827;        /* メインテキスト */
      --text-muted: #6B7280;       /* サブテキスト */
      --primary: #2563EB;          /* メインの青色 */
      --primary-hover: #1D4ED8;
      --border: #E5E7EB;           /* 優しい境界線 */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* ヘッダー */
    .app-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .app-title { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-main); }
    
    /* 検索バー */
    .search-input {
      width: 100%; padding: 12px 16px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: #F3F4F6;
      font-size: 15px; outline: none; transition: all 0.2s;
    }
    .search-input:focus { background: #fff; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    
    /* 汎用ボタン */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; outline: none; border: 1px solid transparent;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-outline { background: #fff; border-color: var(--border); color: var(--text-main); }
    .btn-outline:hover { background: #F9FAFB; border-color: #D1D5DB; }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 6px 12px; }
    .btn-ghost:hover { background: #F3F4F6; color: var(--text-main); }
    .btn-danger-ghost { background: transparent; color: #EF4444; padding: 6px 12px; }
    .btn-danger-ghost:hover { background: #FEF2F2; }

    /* フォーム要素 */
    .form-label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border);
      font-size: 15px; font-family: inherit; box-sizing: border-box; transition: all 0.2s;
    }
    .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    
    /* カード（ファイル・フォルダ） */
    .card {
      background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: all 0.2s ease; margin-bottom: 12px; overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: #D1D5DB; }
    .card-target { border: 2px solid var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.15); }
    .card-header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .card-header:hover { background: #F9FAFB; }
    .card-body { padding: 0 20px 20px; border-top: 1px solid var(--border); }
    
    /* ドラッグハンドル */
    .drag-handle { color: #D1D5DB; cursor: grab; font-size: 16px; padding: 4px; }
    .drag-handle:hover { color: #9CA3AF; }

    /* バッジ */
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .badge-template { background: #EFF6FF; color: #1E40AF; border: 1px solid #DBEAFE; }
    .badge-flow { background: #FFFBEB; color: #B45309; border: 1px solid #FEF3C7; }

    /* セクション区切り */
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #E5E7EB; padding-bottom: 12px; margin-bottom: 20px; cursor: grab; }
    .section-title { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.01em; }
    
    /* リンクテキスト */
    .link-btn {
      background: #F3F4F6; color: #4B5563; border: 1px solid #E5E7EB; border-radius: 6px;
      padding: 4px 10px; margin: 0 4px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px; transition: all 0.2s; vertical-align: middle;
    }
    .link-btn:hover { background: #E5E7EB; color: #111827; }

    /* プレ表示エリア */
    .pre-area { background: #F9FAFB; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; color: #374151; font-family: inherit; margin: 0; }
    .flow-area { background: #FFFBEB; border: 1px solid #FEF3C7; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyBZ7v3kRjAsOGwYdUX_w0FKoGPLUhbR1VQ",
      authDomain: "mail-template-68598.firebaseapp.com",
      projectId: "mail-template-68598",
      storageBucket: "mail-template-68598.firebasestorage.app",
      messagingSenderId: "475374524236",
      appId: "1:475374524236:web:b39a70aebc72bb4172e1e9"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const { useState, useMemo, useEffect } = React;

    // --- コンポーネント群 ---
    function CopyBtn({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); }); };
      if (!text) return <button className="btn btn-outline" style={{opacity: 0.5}} disabled>空です</button>;
      return (
        <button onClick={copy} className={`btn ${copied ? 'btn-primary' : 'btn-outline'}`}>
          {copied ? "✓ コピーしました" : "📋 コピー"}
        </button>
      );
    }

    function DropZone({ onDrop, label }) {
      const [isOver, setIsOver] = useState(false);
      return (
        <div
          onDragOver={e => { e.preventDefault(); e.stopPropagation(); setIsOver(true); }}
          onDragLeave={e => { e.stopPropagation(); setIsOver(false); }}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); setIsOver(false); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); if(data.type === 'category') onDrop(data.name); } catch(err){} }}
          style={{ height: isOver ? "36px" : "12px", background: isOver ? "#EFF6FF" : "transparent", borderRadius: "8px", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", margin: "-6px 0", position: "relative", zIndex: 10, border: isOver ? "2px dashed #93C5FD" : "none" }}
        >
          {isOver && <span style={{fontSize: 12, color: "#2563EB", fontWeight: "bold"}}>{label || "ここに移動"}</span>}
        </div>
      )
    }

    function LinkableText({ text, allTemplates, onLinkClick }) {
      if (!text) return null;
      const regex = /\[リンク:(\d+)\]/g;
      if (!regex.test(text)) return <React.Fragment>{text}</React.Fragment>;
      const parts = text.split(regex);
      return (
        <React.Fragment>
          {parts.map((part, index) => {
            if (index % 2 === 1) {
              const targetId = Number(part);
              const targetTemplate = allTemplates.find(t => t.id === targetId);
              const title = targetTemplate ? targetTemplate.title : `不明なファイル(ID:${targetId})`;
              return <button key={index} className="link-btn" onClick={() => onLinkClick(targetId)}>🔗 {title}</button>;
            }
            return <span key={index}>{part}</span>;
          })}
        </React.Fragment>
      );
    }

    // ＝＝＝ テンプレート（ファイル） ＝＝＝
    function TemplateCard({ t, categories, allTemplates, onUpdate, onDelete, onLinkClick, forceOpenId }) {
      const [open, setOpen] = useState(false);
      const [lang, setLang] = useState("ja"); 
      const [isEditing, setIsEditing] = useState(false);
      const [editData, setEditData] = useState({ ...t });

      const viewMode = t.itemType === "流れ" ? "flow" : "text";

      useEffect(() => { if (forceOpenId === t.id) { setOpen(true); } }, [forceOpenId, t.id]);
      useEffect(() => { if (viewMode === "flow") { setLang("flow"); } else if (lang === "flow") { setLang("ja"); } }, [viewMode]);

      const currentText = lang === "ja" ? t.ja : lang === "en" ? t.en : t.flow;

      const handleImageUpload = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); let w = img.width; let h = img.height; const MAX = 800;
            if (w > MAX || h > MAX) { if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; } }
            canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
            setEditData({...editData, flowImage: canvas.toDataURL('image/jpeg', 0.8)});
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSave = () => { onUpdate(editData); setIsEditing(false); };
      const handleDragStart = (e) => { if (isEditing) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", JSON.stringify({ type: "template", id: t.id })); e.stopPropagation(); e.currentTarget.style.opacity = "0.4"; };

      if (isEditing) {
        return (
          <div className="card" style={{ border: "2px solid #2563EB", padding: "20px" }}>
            <div style={{ marginBottom: 16, fontSize: "12px", color: "#B45309", fontWeight: "bold", background: "#FFFBEB", padding: "10px 14px", borderRadius: "8px" }}>
              💡 別の「流れ」からここにリンクを繋ぐ場合は <span style={{background:"#fff", padding:"4px 8px", border:"1px solid #FEF3C7", borderRadius:6}}>[リンク:{t.id}]</span> と記入してください。
            </div>
            <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
              <div style={{ flex: 2, minWidth: "250px" }}>
                <label className="form-label">タイトル</label>
                <input type="text" className="form-control" value={editData.title} onChange={e => setEditData({...editData, title: e.target.value})} />
              </div>
              <div style={{ width: "160px" }}>
                <label className="form-label">項目タイプ</label>
                <select className="form-control" value={editData.itemType || "テンプレ"} onChange={e => setEditData({...editData, itemType: e.target.value})}>
                  <option value="テンプレ">テンプレ</option><option value="流れ">流れ</option>
                </select>
              </div>
            </div>
            
            {(editData.itemType === "テンプレ" || !editData.itemType) && (
              <React.Fragment>
                <div style={{ marginBottom: 20 }}>
                  <label className="form-label">🇯🇵 日本語 テンプレート</label>
                  <textarea className="form-control" value={editData.ja || ""} onChange={e => setEditData({...editData, ja: e.target.value})} style={{ height: "240px", resize: "vertical" }} />
                </div>
                <div style={{ marginBottom: 20 }}>
                  <label className="form-label">🇬🇧 English テンプレート</label>
                  <textarea className="form-control" value={editData.en || ""} onChange={e => setEditData({...editData, en: e.target.value})} style={{ height: "180px", resize: "vertical" }} />
                </div>
              </React.Fragment>
            )}

            {editData.itemType === "流れ" && (
              <div style={{ marginBottom: 24, background: "#FFFBEB", padding: "20px", borderRadius: "12px", border: "1px solid #FEF3C7" }}>
                <label className="form-label" style={{ color: "#92400E" }}>📋 対応の流れ・社内マニュアル</label>
                <textarea className="form-control" value={editData.flow || ""} onChange={e => setEditData({...editData, flow: e.target.value})} style={{ height: "400px", resize: "vertical", marginBottom: 16 }} />
                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <input type="file" accept="image/*" onChange={handleImageUpload} id={`file-${t.id}`} style={{ display: "none" }} />
                  <label htmlFor={`file-${t.id}`} className="btn btn-outline">📷 画像を添付</label>
                  {editData.flowImage && <div style={{position:"relative"}}><img src={editData.flowImage} style={{ height: "50px", borderRadius: "6px", border: "1px solid #D1D5DB" }} /><button onClick={() => setEditData({...editData, flowImage: null})} style={{ position: "absolute", top: -8, right: -8, background: "#EF4444", color: "#fff", borderRadius: "50%", width: 20, height: 20, border: "none", cursor: "pointer", fontSize: 10 }}>✖</button></div>}
                </div>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
              <button className="btn btn-outline" onClick={() => setIsEditing(false)}>キャンセル</button>
              <button className="btn btn-primary" onClick={handleSave}>保存する</button>
            </div>
          </div>
        );
      }

      return (
        <div id={`file-card-${t.id}`} className={`card ${forceOpenId === t.id ? 'card-target' : ''}`} draggable onDragStart={handleDragStart} onDragEnd={e => e.currentTarget.style.opacity = "1"}>
          <div className="card-header" onClick={() => setOpen(!open)}>
            <span className="drag-handle">☰</span>
            <span className={`badge ${t.itemType === '流れ' ? 'badge-flow' : 'badge-template'}`}>{t.itemType || "テンプレ"}</span>
            <span style={{ fontWeight: 600, fontSize: "16px", flex: 1, display: "flex", alignItems: "center", gap: "10px" }}>
              {t.title} <span style={{ fontSize: "13px", color: "var(--text-muted)", fontWeight: "normal" }}>ID: {t.id}</span>
            </span>
            <div style={{ display: "flex", gap: 8 }} onClick={e => e.stopPropagation()}>
              <button className="btn btn-ghost" onClick={() => { setEditData({...t}); setIsEditing(true); setOpen(true); }}>✏️ 編集</button>
              <button className="btn btn-danger-ghost" onClick={() => { if(confirm("削除しますか？")) onDelete(t.id); }}>🗑️</button>
            </div>
            <span style={{ color: "var(--text-muted)", marginLeft: "4px" }}>{open ? "▲" : "▼"}</span>
          </div>

          {open && (
            <div className="card-body">
              {viewMode === "flow" ? (
                <div style={{ paddingTop: "16px" }}>
                  <pre className="pre-area flow-area">
                    <LinkableText text={t.flow} allTemplates={allTemplates} onLinkClick={onLinkClick} />
                  </pre>
                  {t.flowImage && <div style={{ marginTop: 20, textAlign: "center" }}><img src={t.flowImage} style={{ maxWidth: "100%", maxHeight: "500px", borderRadius: "8px", border: "1px solid var(--border)" }} /></div>}
                </div>
              ) : (
                <div style={{ paddingTop: "16px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                    <button onClick={() => setLang("ja")} className={`btn ${lang === "ja" ? "btn-primary" : "btn-outline"}`} style={{borderRadius: 20}}>🇯🇵 日本語</button>
                    <button onClick={() => setLang("en")} className={`btn ${lang === "en" ? "btn-primary" : "btn-outline"}`} style={{borderRadius: 20}}>🇬🇧 English</button>
                    <div style={{ marginLeft: "auto" }}><CopyBtn text={currentText} /></div>
                  </div>
                  <pre className="pre-area">
                    <LinkableText text={currentText} allTemplates={allTemplates} onLinkClick={onLinkClick} />
                  </pre>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ＝＝＝ フォルダ＆セクション ＝＝＝
    function FolderSection({ catObj, categories, templates, allTemplates, onMoveTemplate, onMoveFolder, onReorderCategory, onRenameCat, onDeleteCat, onAddTemplate, onUpdateTemplate, onDeleteTemplate, onLinkClick, forceOpenId, level = 0 }) {
      const catName = catObj.name;
      const [isOpen, setIsOpen] = useState(false);
      const [isEditingName, setIsEditingName] = useState(false);
      const [newName, setNewName] = useState(catName);

      const childFolders = categories.filter(c => c.parent === catName);
      const childTemplates = templates.filter(t => t.category === catName);

      const containsTarget = useMemo(() => {
        if (!forceOpenId) return false;
        const checkContains = (folderName) => {
          if (templates.some(t => t.category === folderName && t.id === forceOpenId)) return true;
          const sub = categories.filter(c => c.parent === folderName);
          for (const s of sub) { if (checkContains(s.name)) return true; } return false;
        };
        return checkContains(catName);
      }, [forceOpenId, templates, categories, catName]);

      useEffect(() => { if (containsTarget) { setIsOpen(true); } }, [containsTarget]);
      
      const handleDragStart = (e) => { if (isEditingName) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", JSON.stringify({ type: "category", name: catName })); e.stopPropagation(); };
      const handleDropInside = (e) => { e.preventDefault(); e.stopPropagation(); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); if (data.type === "template") { onMoveTemplate(data.id, catName); setIsOpen(true); } else if (data.type === "category" && data.name !== catName) { onMoveFolder(data.name, catName); setIsOpen(true); } } catch(err){} };

      if (catObj.type === "section") {
        return (
          <div style={{ marginTop: 60, marginBottom: 32 }}>
            <DropZone onDrop={(draggedName) => onReorderCategory(draggedName, catName)} label="ここに移動" />
            <div className="section-header" draggable={!isEditingName} onDragStart={handleDragStart} onDragOver={e => e.preventDefault()} onDrop={handleDropInside}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span className="drag-handle">☰</span>
                {isEditingName ? (
                  <div style={{ display: "flex", gap: 8 }}><input type="text" className="form-control" value={newName} onChange={e => setNewName(e.target.value)} style={{ width: "250px", fontSize: "18px", fontWeight: "bold" }} /><button className="btn btn-primary" onClick={() => { if(newName.trim()) onRenameCat(catName, newName.trim()); setIsEditingName(false); }}>保存</button></div>
                ) : (
                  <span className="section-title">{catName}</span>
                )}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn btn-outline" onClick={() => setIsEditingName(true)}>✏️</button>
                <button className="btn btn-outline" style={{color: "var(--danger)"}} onClick={() => onDeleteCat(catName)}>🗑️</button>
              </div>
            </div>
            <div style={{ paddingLeft: "8px" }}>
              {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} allTemplates={allTemplates} onMoveTemplate={onMoveTemplate} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} level={level + 1} />)}
              {childFolders.length > 0 && <DropZone onDrop={(draggedName) => onMoveFolder(draggedName, catName)} label="の一番下に移動" />}
              {childTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} allTemplates={allTemplates} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} />)}
            </div>
          </div>
        );
      }

      return (
        <div style={{ marginBottom: 16, marginLeft: level > 0 ? "32px" : "0" }}>
          <DropZone onDrop={(draggedName) => onReorderCategory(draggedName, catName)} label="上に移動" />
          <div className="card" style={{ borderLeft: level > 0 ? "4px solid var(--primary)" : "1px solid var(--border)" }}>
            <div className="card-header" draggable={!isEditingName} onDragStart={handleDragStart} onDragOver={e => e.preventDefault()} onDrop={handleDropInside} onClick={() => { if (!isEditingName) setIsOpen(!isOpen); }}>
              <span style={{ fontSize: 14, color: "var(--text-muted)", marginRight: 8, width: 16, display: "inline-block" }}>{isOpen ? "▼" : "▶"}</span>
              <span style={{ fontSize: 20, marginRight: 8 }}>📂</span>
              {isEditingName ? (
                <div onClick={e => e.stopPropagation()} style={{ display: "flex", gap: 8, flex: 1 }}><input type="text" className="form-control" value={newName} onChange={e => setNewName(e.target.value)} style={{ padding: "6px 12px" }} autoFocus /><button className="btn btn-primary" onClick={() => { if(newName.trim()) onRenameCat(catName, newName.trim()); setIsEditingName(false); }}>保存</button></div>
              ) : (
                <span style={{ fontSize: 16, fontWeight: 700, flex: 1 }}>{catName}</span>
              )}
              <div style={{ display: "flex", gap: 8 }} onClick={e => e.stopPropagation()}>
                {level > 0 && <button className="btn btn-outline" onClick={() => onMoveFolder(catName, null)}>⬆️ 外へ</button>}
                <button className="btn btn-primary" onClick={() => { onAddTemplate(catName); setIsOpen(true); }}>➕ 追加</button>
                <button className="btn btn-ghost" onClick={() => setIsEditingName(true)}>✏️</button>
                <button className="btn btn-danger-ghost" onClick={() => onDeleteCat(catName)}>🗑️</button>
              </div>
            </div>
            {isOpen && (
              <div className="card-body" style={{ background: "#F9FAFB", paddingTop: "20px" }}>
                {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} allTemplates={allTemplates} onMoveTemplate={onMoveTemplate} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} level={level + 1} />)}
                {childTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} allTemplates={allTemplates} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} onLinkClick={onLinkClick} forceOpenId={forceOpenId} />)}
                {childFolders.length === 0 && childTemplates.length === 0 && <div style={{ textAlign: "center", color: "var(--text-muted)", fontSize: 13, padding: "20px", border: "1px dashed var(--border)", borderRadius: "8px", background: "#fff" }}>空のフォルダです</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ＝＝＝ アプリ本体 ＝＝＝
    function App() {
      const [categories, setCategories] = useState(null); 
      const [templates, setTemplates] = useState(null);
      const [search, setSearch] = useState("");
      const [forceOpenId, setForceOpenId] = useState(null);
      
      useEffect(() => {
        const unsubCat = db.collection('mailApp').doc('categories').onSnapshot(doc => {
          if (doc.exists) setCategories(doc.data().data);
        });
        const unsubTemp = db.collection('mailTemplates').onSnapshot(snap => {
          if (!snap.empty) {
            const temps = snap.docs.map(doc => doc.data());
            temps.sort((a,b) => b.id - a.id); setTemplates(temps);
          }
        });
        return () => { unsubCat(); unsubTemp(); };
      }, []);

      const handleLinkClick = (targetId) => {
        setForceOpenId(targetId);
        setTimeout(() => {
          const element = document.getElementById(`file-card-${targetId}`);
          if (element) {
            const y = element.getBoundingClientRect().top + window.scrollY - 120;
            window.scrollTo({ top: y, behavior: 'smooth' });
            setTimeout(() => setForceOpenId(null), 1500);
          } else { alert("指定されたファイルが見つかりません。"); }
        }, 300);
      };

      const searchResultTemplates = useMemo(() => {
        if (!search || !templates) return []; const q = search.toLowerCase();
        return templates.filter(t => t.title.toLowerCase().includes(q) || (t.ja && t.ja.toLowerCase().includes(q)) || (t.en && t.en.toLowerCase().includes(q)) || (t.flow && t.flow.toLowerCase().includes(q)));
      }, [templates, search]);

      const rootFolders = useMemo(() => {
        if (!categories) return []; return categories.filter(c => c.parent === null);
      }, [categories]);

      if (!categories || !templates) {
        return <div style={{textAlign: "center", marginTop: "150px", color: "var(--text-muted)", fontSize: "16px", fontWeight: "bold"}}>☁️ システムを読み込み中...</div>;
      }

      const updateCats = (newCats) => db.collection('mailApp').doc('categories').set({ data: newCats });
      const handleUpdateTemplate = (updatedT) => db.collection('mailTemplates').doc(updatedT.id.toString()).set(updatedT);
      const handleDeleteTemplate = (id) => db.collection('mailTemplates').doc(id.toString()).delete();
      
      const handleAddCategory = (type) => {
        const name = prompt(`新しい${type === "section" ? "区切り線" : "フォルダ"}の名前を入力してください`);
        if (!name || !name.trim()) return;
        updateCats([...categories, { name: name.trim(), parent: null, type: type }]);
      };

      const handleDeleteCategory = (catName) => {
        if (!confirm(`削除しますか？`)) return;
        let nextCats = categories.map(c => c.parent === catName ? { ...c, parent: null } : c).filter(c => c.name !== catName);
        updateCats(nextCats);
        templates.filter(t => t.category === catName).forEach(t => { db.collection('mailTemplates').doc(t.id.toString()).update({ category: "その他" }); });
      };

      const handleRenameCategory = (oldName, newName) => {
        updateCats(categories.map(c => c.name === oldName ? { ...c, name: newName } : c.parent === oldName ? { ...c, parent: newName } : c));
        templates.filter(t => t.category === oldName).forEach(t => { db.collection('mailTemplates').doc(t.id.toString()).update({ category: newName }); });
      };

      const handleAddTemplate = (catName) => {
        const newId = templates.length > 0 ? Math.max(...templates.map(t => t.id)) + 1 : 1;
        db.collection('mailTemplates').doc(newId.toString()).set({ id: newId, category: catName, itemType: "テンプレ", title: "新規ファイル", ja: "", en: "", flow: "", flowImage: null });
      };

      const handleMoveTemplate = (id, targetCategory) => db.collection('mailTemplates').doc(id.toString()).update({ category: targetCategory });
      
      const handleMoveFolder = (folderName, newParentName) => {
        const arr = [...categories]; const idx = arr.findIndex(c => c.name === folderName); if(idx === -1) return;
        const obj = arr.splice(idx, 1)[0]; obj.parent = newParentName; arr.push(obj); updateCats(arr);
      };

      const handleReorderCategory = (draggedName, targetName) => {
        if (draggedName === targetName) return;
        const arr = [...categories]; const dIdx = arr.findIndex(c => c.name === draggedName); const tIdx = arr.findIndex(c => c.name === targetName);
        if (dIdx === -1 || tIdx === -1) return;
        const draggedObj = arr.splice(dIdx, 1)[0]; draggedObj.parent = arr[tIdx < dIdx ? tIdx : tIdx - 1].parent;
        arr.splice(arr.findIndex(c => c.name === targetName), 0, draggedObj); updateCats(arr);
      };

      return (
        <div>
          <header className="app-header">
            <div style={{ maxWidth: 1000, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <h1 className="app-title">📨 テンプレ管理システム</h1>
                <div style={{ display: "flex", gap: 12 }}>
                  <button className="btn btn-outline" onClick={() => handleAddCategory("folder")}>📂 フォルダ追加</button>
                  <button className="btn btn-outline" onClick={() => handleAddCategory("section")}>➖ 区切り線</button>
                </div>
              </div>
              <input className="search-input" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 キーワードで検索（タイトル、本文、流れ）" />
            </div>
          </header>

          <main style={{ maxWidth: 1000, margin: "0 auto", padding: "40px 24px 100px" }}>
            {search ? (
              <div>
                <p style={{ fontSize: 15, color: "var(--text-muted)", marginBottom: 20, fontWeight: "bold" }}>検索結果: {searchResultTemplates.length} 件</p>
                {searchResultTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} allTemplates={templates} onUpdate={handleUpdateTemplate} onDelete={handleDeleteTemplate} onLinkClick={handleLinkClick} forceOpenId={forceOpenId} />)}
              </div>
            ) : (
              <div>
                {rootFolders.map(cat => (
                  <FolderSection key={cat.name} catObj={cat} categories={categories} templates={templates} allTemplates={templates} onMoveTemplate={handleMoveTemplate} onMoveFolder={handleMoveFolder} onReorderCategory={handleReorderCategory} onRenameCat={handleRenameCategory} onDeleteCat={handleDeleteCategory} onAddTemplate={handleAddTemplate} onUpdateTemplate={handleUpdateTemplate} onDeleteTemplate={handleDeleteTemplate} onLinkClick={handleLinkClick} forceOpenId={forceOpenId} level={0} />
                ))}
                <DropZone onDrop={(draggedName) => {
                  const arr = [...categories]; const dIdx = arr.findIndex(c => c.name === draggedName); const obj = arr.splice(dIdx, 1)[0]; obj.parent = null; arr.push(obj); updateCats(arr);
                }} label="一番下に移動" />
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
