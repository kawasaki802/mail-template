<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールテンプレート管理アプリ（項目タイプ拡張版）</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #f2f3f7;">

  <div id="root"></div>

  <script type="text/babel">
    // Firebase初期化
    const firebaseConfig = {
      apiKey: "AIzaSyBZ7v3kRjAsOGwYdUX_w0FKoGPLUhbR1VQ",
      authDomain: "mail-template-68598.firebaseapp.com",
      projectId: "mail-template-68598",
      storageBucket: "mail-template-68598.firebasestorage.app",
      messagingSenderId: "475374524236",
      appId: "1:475374524236:web:b39a70aebc72bb4172e1e9"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const { useState, useMemo, useEffect } = React;

    // 初期状態の項目タイプ（プルダウンの中身）
    const INITIAL_ITEM_TYPES = [
      { id: "template", name: "テンプレ", viewMode: "text" }, // 日本語・英語
      { id: "flow", name: "流れ", viewMode: "flow" }          // 対応の流れのみ
    ];

    const INITIAL_TEMPLATES = [
      { id: 1, category: "予約前", tag: "Airbnb", title: "スペシャルオファー", itemType: "template", ja: `お世話になっております。\nお問い合わせいただき、ありがとうございます。\n\n元から料金を比較的安く設定している施設ですので、少しだけであれば可能です！`, en: `Hi\n\nThank you for your inquiry.\n\nSince our facility already has relatively low rates, we can accommodate a small adjustment!`, flow: "値引き額は500円目安。大きい金額は使わない。オプション無料でレビュー満点を狙う場合あり。", flowImage: null },
      { id: 2, category: "チェックイン", tag: "共通", title: "チェックイン時間の問い合わせ", itemType: "template", ja: `お世話になっております。\nお問い合わせいただき、ありがとうございます。\n\n当施設にフロントはなくセルフチェックインとなりますので、16:00以降はいつでも大丈夫です。\nチェックインの詳細につきましてはマニュアルに記載しておりますので、必ず事前にご確認お願いいたします。\nhttps://マニュアルURL`, en: `Hi,\n\nYou can check in anytime after 16:00 by yourself.`, flow: "", flowImage: null }
    ];

    const INITIAL_CATEGORIES = [
      { name: "📝 予約〜チェックイン前", parent: null, type: "section" },
      { name: "予約前", parent: "📝 予約〜チェックイン前", type: "folder" },
      { name: "マニュアル未読", parent: "📝 予約〜チェックイン前", type: "folder" },
      { name: "🏨 チェックイン・滞在中", parent: null, type: "section" },
      { name: "チェックイン", parent: "🏨 チェックイン・滞年中", type: "folder" },
      { name: "その他", parent: null, type: "folder" }
    ];

    const TAG_COLORS = { "Airbnb": "#FF5A5F", "Booking.com": "#003580", "Agoda": "#5392F9", "共通": "#4A7C6F", "NTH": "#8B5E3C", "全施設": "#555" };
    function tagColor(tag) { return Object.keys(TAG_COLORS).find(k => tag.includes(k)) ? TAG_COLORS[Object.keys(TAG_COLORS).find(k => tag.includes(k))] : "#666"; }

    function CopyBtn({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); }); };
      if (!text) return <button style={{ opacity: 0.5, padding: "5px 14px", borderRadius: 6, fontSize: 12, border: "none" }}>空です</button>;
      return <button onClick={copy} style={{ background: copied ? "#2E7D32" : "#1a1a2e", color: "#fff", border: "none", borderRadius: 6, padding: "5px 14px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>{copied ? "✓ コピーしました" : "📋 コピー"}</button>;
    }

    function DropZone({ onDrop, label }) {
      const [isOver, setIsOver] = useState(false);
      return (
        <div
          onDragOver={e => { e.preventDefault(); e.stopPropagation(); setIsOver(true); }}
          onDragLeave={e => { e.stopPropagation(); setIsOver(false); }}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); setIsOver(false); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); if(data.type === 'category') onDrop(data.name); } catch(err){} }}
          style={{ height: isOver ? "30px" : "12px", background: isOver ? "#e1f5fe" : "transparent", borderRadius: "4px", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", margin: "-6px 0", position: "relative", zIndex: 10, border: isOver ? "2px dashed #0288d1" : "none" }}
        >
          {isOver && <span style={{fontSize: 11, color: "#0288d1", fontWeight: "bold"}}>{label || "ここに移動"}</span>}
        </div>
      )
    }

    // ＝＝＝ テンプレート（ファイル）コンポーネント ＝＝＝
    function TemplateCard({ t, categories, itemTypes, onUpdate, onDelete }) {
      const [open, setOpen] = useState(false);
      const [lang, setLang] = useState("ja"); 
      const [isEditing, setIsEditing] = useState(false);
      const [editData, setEditData] = useState({ ...t });

      // 現在のファイルの項目タイプ（テンプレか流れか）の設定を取得
      const currentTypeObj = useMemo(() => {
        return itemTypes.find(type => type.name === (t.itemType || "テンプレ")) || itemTypes[0];
      }, [itemTypes, t.itemType]);

      // 表示モード（"text"=日本語英語、"flow"=対応の流れ）を自動判定
      const viewMode = currentTypeObj ? currentTypeObj.viewMode : "text";

      // タブのデフォルト切り替え制御
      useEffect(() => {
        if (viewMode === "flow") { setLang("flow"); } 
        else if (lang === "flow") { setLang("ja"); }
      }, [viewMode]);

      const currentText = lang === "ja" ? t.ja : lang === "en" ? t.en : t.flow;

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width; let h = img.height;
            const MAX = 600;
            if (w > MAX || h > MAX) { if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; } }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
            setEditData({...editData, flowImage: canvas.toDataURL('image/jpeg', 0.8)});
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSave = () => { onUpdate(editData); setIsEditing(false); };
      const handleDragStart = (e) => {
        if (isEditing) { e.preventDefault(); return; }
        e.dataTransfer.setData("text/plain", JSON.stringify({ type: "template", id: t.id }));
        e.stopPropagation(); e.currentTarget.style.opacity = "0.4";
      };

      if (isEditing) {
        return (
          <div style={{ background: "#fff", borderRadius: 10, border: "2px solid #f0a500", marginBottom: 10, padding: "16px", boxShadow: "0 4px 12px rgba(0,0,0,.1)" }}>
            <div style={{ marginBottom: 12, display: "flex", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: 2, minWidth: "200px" }}>
                <label style={{ fontSize: 11, color: "#666", fontWeight: 700 }}>タイトル</label>
                <input type="text" value={editData.title} onChange={e => setEditData({...editData, title: e.target.value})} style={{ width: "100%", padding: "6px 8px", borderRadius: 4, border: "1px solid #ccc", boxSizing: "border-box" }} />
              </div>
              <div style={{ width: "120px" }}>
                <label style={{ fontSize: 11, color: "#666", fontWeight: 700 }}>タグ</label>
                <input type="text" value={editData.tag} onChange={e => setEditData({...editData, tag: e.target.value})} style={{ width: "100%", padding: "6px 8px", borderRadius: 4, border: "1px solid #ccc", boxSizing: "border-box" }} />
              </div>
              {/* ★項目タイプの切り替えプルダウンメニュー */}
              <div style={{ width: "140px" }}>
                <label style={{ fontSize: 11, color: "#666", fontWeight: 700 }}>項目タイプ</label>
                <select value={editData.itemType || "テンプレ"} onChange={e => setEditData({...editData, itemType: e.target.value})} style={{ width: "100%", padding: "6px 8px", borderRadius: 4, border: "1px solid #ccc", background: "#fff" }}>
                  {itemTypes.map(type => (
                    <option key={type.id} value={type.name}>{type.name}</option>
                  ))}
                </select>
              </div>
            </div>
            
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 11, color: "#666", fontWeight: 700 }}>🇯🇵 日本語 テンプレート</label>
              <textarea value={editData.ja} onChange={e => setEditData({...editData, ja: e.target.value})} style={{ width: "100%", height: "100px", padding: "8px", borderRadius: 4, border: "1px solid #ccc", boxSizing: "border-box" }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 11, color: "#666", fontWeight: 700 }}>🇬🇧 English テンプレート</label>
              <textarea value={editData.en} onChange={e => setEditData({...editData, en: e.target.value})} style={{ width: "100%", height: "80px", padding: "8px", borderRadius: 4, border: "1px solid #ccc", boxSizing: "border-box" }} />
            </div>
            <div style={{ marginBottom: 16, background: "#fffbf0", padding: "10px", borderRadius: 6, border: "1px solid #f0e6d2" }}>
              <label style={{ fontSize: 11, color: "#7a5800", fontWeight: 700, display: "block", marginBottom: 6 }}>📋 対応の流れ・注意事項</label>
              <textarea value={editData.flow} onChange={e => setEditData({...editData, flow: e.target.value})} style={{ width: "100%", height: "60px", padding: "8px", borderRadius: 4, border: "1px solid #ccc", boxSizing: "border-box", marginBottom: 8 }} />
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <input type="file" accept="image/*" onChange={handleImageUpload} id={`file-${t.id}`} style={{ display: "none" }} />
                <label htmlFor={`file-${t.id}`} style={{ background: "#fff", border: "1px solid #ccc", padding: "4px 10px", borderRadius: 4, fontSize: 11, cursor: "pointer", fontWeight: 600 }}>📷 画像を選択</label>
                {editData.flowImage && <img src={editData.flowImage} style={{ height: "40px", borderRadius: "4px" }} />}
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
              <button onClick={() => setIsEditing(false)} style={{ background: "#eee", border: "none", padding: "6px 16px", borderRadius: 4, cursor: "pointer" }}>キャンセル</button>
              <button onClick={handleSave} style={{ background: "#2E7D32", color: "#fff", border: "none", padding: "6px 20px", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>保存する</button>
            </div>
          </div>
        );
      }

      return (
        <div draggable onDragStart={handleDragStart} onDragEnd={e => e.currentTarget.style.opacity = "1"} style={{ background: "#fff", borderRadius: 10, border: "1px solid #e8e8e8", marginBottom: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,.05)" }}>
          <div onClick={() => setOpen(!open)} style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none", background: open ? "#fafafa" : "#fff" }}>
            <span style={{ fontSize: 16, cursor: "grab", color: "#ccc" }}>☰</span>
            <span style={{ background: tagColor(t.tag), color: "#fff", borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{t.tag}</span>
            <span style={{ fontWeight: 600, fontSize: 14, flex: 1 }}>{t.title}</span>
            
            {/* 項目バッジの表示 */}
            <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: viewMode === "flow" ? "#fffbf0" : "#f0f0f4", color: viewMode === "flow" ? "#b78103" : "#666", fontWeight: "bold", border: viewMode === "flow" ? "1px solid #f0a500" : "1px solid #ddd" }}>
              {t.itemType || "テンプレ"}
            </span>

            <div style={{ display: "flex", gap: 6 }} onClick={e => e.stopPropagation()}>
              <button onClick={() => { setEditData({...t}); setIsEditing(true); setOpen(true); }} style={{ background: "#ebedf3", border: "none", color: "#555", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>✏️ 編集</button>
              <button onClick={() => { if(confirm("削除しますか？")) onDelete(t.id); }} style={{ background: "#ffebee", border: "none", color: "#c62828", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>🗑️</button>
            </div>
            <span style={{ color: "#aaa", fontSize: 14 }}>{open ? "▲" : "▼"}</span>
          </div>

          {open && (
            <div style={{ padding: "0 16px 14px", borderTop: "1px solid #f0f0f0" }}>
              {/* ★ タイプによって表示を切り替え */}
              {viewMode === "flow" ? (
                // ▼ 流れモード（対応の流れを最初から大画面表示）
                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 11, color: "#7a5800", fontWeight: "bold", marginBottom: 4 }}>📋 対応の流れ・社内マニュアル</div>
                  <pre style={{ background: "#fffbf0", border: "1px solid #f0e6d2", borderRadius: 6, padding: "12px 14px", fontSize: 13, lineHeight: 1.8, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0, color: "#222", fontFamily: "inherit" }}>
                    {t.flow || "（流れのテキストは登録されていません）"}
                  </pre>
                  {t.flowImage && (
                    <div style={{ marginTop: 12, textAlign: "center" }}>
                      <img src={t.flowImage} style={{ maxWidth: "100%", maxHeight: "300px", borderRadius: "6px" }} />
                    </div>
                  )}
                </div>
              ) : (
                // ▼ テンプレモード（日本語・英語のコピー画面）
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 12, marginBottom: 8 }}>
                    <button onClick={() => setLang("ja")} style={{ padding: "4px 14px", borderRadius: 20, border: "1.5px solid", borderColor: lang === "ja" ? "#1a1a2e" : "#ddd", background: lang === "ja" ? "#1a1a2e" : "#fff", color: lang === "ja" ? "#fff" : "#555", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>🇯🇵 日本語</button>
                    <button onClick={() => setLang("en")} style={{ padding: "4px 14px", borderRadius: 20, border: "1.5px solid", borderColor: lang === "en" ? "#1a1a2e" : "#ddd", background: lang === "en" ? "#1a1a2e" : "#fff", color: lang === "en" ? "#fff" : "#555", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>🇬🇧 English</button>
                    <div style={{ marginLeft: "auto" }}><CopyBtn text={currentText} /></div>
                  </div>
                  <pre style={{ background: "#f8f9fa", borderRadius: 6, padding: "12px 14px", fontSize: 13, lineHeight: 1.8, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0, color: "#222", maxHeight: 340, overflowY: "auto", fontFamily: "inherit" }}>
                    {currentText || "（テキストはありません）"}
                  </pre>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ＝＝＝ フォルダ（大項目）＆ 区切り線 コンポーネント ＝＝＝
    function FolderSection({ catObj, categories, templates, itemTypes, onMoveTemplate, onMoveFolder, onReorderCategory, onRenameCat, onDeleteCat, onAddTemplate, onUpdateTemplate, onDeleteTemplate, level = 0 }) {
      const catName = catObj.name;
      const [isOpen, setIsOpen] = useState(true);
      const [isEditingName, setIsEditingName] = useState(false);
      const [newName, setNewName] = useState(catName);

      const childFolders = categories.filter(c => c.parent === catName);
      const childTemplates = templates.filter(t => t.category === catName);
      
      const handleDragStart = (e) => { if (isEditingName) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", JSON.stringify({ type: "category", name: catName })); e.stopPropagation(); };
      const handleDropInside = (e) => { e.preventDefault(); e.stopPropagation(); try { const data = JSON.parse(e.dataTransfer.getData("text/plain")); if (data.type === "template") { onMoveTemplate(data.id, catName); setIsOpen(true); } else if (data.type === "category" && data.name !== catName) { onMoveFolder(data.name, catName); setIsOpen(true); } } catch(err){} };

      if (catObj.type === "section") {
        return (
          <div style={{ marginTop: 80, marginBottom: 24 }}>
            <DropZone onDrop={(draggedName) => onReorderCategory(draggedName, catName)} label="ここに移動" />
            <div draggable={!isEditingName} onDragStart={handleDragStart} onDragOver={e => e.preventDefault()} onDrop={handleDropInside} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", borderBottom: "3px solid #1a1a2e", paddingBottom: "8px", marginBottom: "16px", cursor: "grab" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16, color: "#ccc" }}>☰</span>
                {isEditingName ? (
                  <div style={{ display: "flex", gap: 4 }}><input type="text" value={newName} onChange={e => setNewName(e.target.value)} style={{ padding: "4px", fontSize: 18, fontWeight: "bold" }} /><button onClick={() => { if(newName.trim()) onRenameCat(catName, newName.trim()); setIsEditingName(false); }} style={{ background: "#1a1a2e", color: "#fff", border: "none", borderRadius: 4, padding: "4px 8px" }}>保存</button></div>
                ) : (
                  <span style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", letterSpacing: ".05em" }}>{catName}</span>
                )}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setIsEditingName(true)} style={{ background: "transparent", border: "1px solid #ccc", color: "#555", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>✏️ 名前</button>
                <button onClick={() => onDeleteCat(catName)} style={{ background: "transparent", border: "1px solid #fca5a5", color: "#c62828", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>🗑️ 削除</button>
              </div>
            </div>
            <div style={{ paddingLeft: "8px" }}>
              {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} itemTypes={itemTypes} onMoveTemplate={onMoveTemplate} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} level={level + 1} />)}
              {childFolders.length > 0 && <DropZone onDrop={(draggedName) => onMoveFolder(draggedName, catName)} label="の一番下に移動" />}
              {childTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} itemTypes={itemTypes} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} />)}
            </div>
          </div>
        );
      }

      return (
        <div style={{ marginBottom: 12, marginLeft: level > 0 ? "24px" : "0" }}>
          <DropZone onDrop={(draggedName) => onReorderCategory(draggedName, catName)} label="上に移動" />
          <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #dcdce6", overflow: "hidden", borderLeft: level > 0 ? "4px solid #1a1a2e" : "1px solid #dcdce6" }}>
            <div draggable={!isEditingName} onDragStart={handleDragStart} onDragOver={e => e.preventDefault()} onDrop={handleDropInside} style={{ padding: "10px 16px", background: isOpen ? "#f0f1f5" : "#fff", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: isOpen ? "1px solid #dcdce6" : "none", cursor: "grab" }}>
              <div onClick={() => { if (!isEditingName) setIsOpen(!isOpen); }} style={{ flex: 1, display: "flex", alignItems: "center", cursor: "pointer", userSelect: "none" }}>
                <span style={{ fontSize: 14, color: "#888", marginRight: 8, width: 14, display: "inline-block" }}>{isOpen ? "▼" : "▶"}</span>
                <span style={{ fontSize: 18, marginRight: 6 }}>📂</span>
                {isEditingName ? (
                  <div onClick={e => e.stopPropagation()} style={{ display: "flex", gap: 4 }}><input type="text" value={newName} onChange={e => setNewName(e.target.value)} style={{ padding: "2px 6px", fontSize: 14 }} autoFocus /><button onClick={() => { if(newName.trim()) onRenameCat(catName, newName.trim()); setIsEditingName(false); }} style={{ background: "#1a1a2e", color: "#fff", border: "none", borderRadius: 4, padding: "2px 8px", fontSize: 12 }}>保存</button></div>
                ) : (
                  <span style={{ fontSize: 15, fontWeight: 700, color: "#1a1a2e" }}>{catName}</span>
                )}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {level > 0 && <button onClick={(e) => { e.stopPropagation(); onMoveFolder(catName, null); }} style={{ background: "#fff", border: "1px solid #ccc", color: "#333", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>⬆️ 外へ</button>}
                <button onClick={(e) => { e.stopPropagation(); onAddTemplate(catName); setIsOpen(true); }} style={{ background: "#2E7D32", color: "#fff", border: "none", fontSize: 11, padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>➕ 追加</button>
                <button onClick={(e) => { e.stopPropagation(); setIsEditingName(true); }} style={{ background: "#ebedf3", border: "none", color: "#555", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>✏️</button>
                <button onClick={(e) => { e.stopPropagation(); onDeleteCat(catName); }} style={{ background: "#ffebee", border: "none", color: "#c62828", fontSize: 11, padding: "4px 8px", borderRadius: 4, cursor: "pointer" }}>🗑️</button>
              </div>
            </div>
            {isOpen && (
              <div style={{ padding: "16px", background: "#f8f9fa" }}>
                {childFolders.map(childCat => <FolderSection key={childCat.name} catObj={childCat} categories={categories} templates={templates} itemTypes={itemTypes} onMoveTemplate={onMoveTemplate} onMoveFolder={onMoveFolder} onReorderCategory={onReorderCategory} onRenameCat={onRenameCat} onDeleteCat={onDeleteCat} onAddTemplate={onAddTemplate} onUpdateTemplate={onUpdateTemplate} onDeleteTemplate={onDeleteTemplate} level={level + 1} />)}
                {childTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} itemTypes={itemTypes} onUpdate={onUpdateTemplate} onDelete={onDeleteTemplate} />)}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ＝＝＝ アプリ本体 ＝＝＝
    function App() {
      const [categories, setCategories] = useState(null); 
      const [templates, setTemplates] = useState(null);
      const [itemTypes, setItemTypes] = useState(null); // ★追加した項目タイプの管理状態
      const [search, setSearch] = useState("");
      const [showTypeManager, setShowTypeManager] = useState(false);
      const [newTypeName, setNewTypeName] = useState("");
      const [newTypeMode, setNewTypeMode] = useState("text");

      useEffect(() => {
        // 項目種類のリアルタイム取得
        const unsubTypes = db.collection('mailApp').doc('itemTypes').onSnapshot(doc => {
          if (doc.exists) { setItemTypes(doc.data().data); } 
          else { db.collection('mailApp').doc('itemTypes').set({ data: INITIAL_ITEM_TYPES }); }
        });

        const unsubCat = db.collection('mailApp').doc('categories').onSnapshot(doc => {
          if (doc.exists) { setCategories(doc.data().data); } 
          else { db.collection('mailApp').doc('categories').set({ data: INITIAL_CATEGORIES }); }
        });

        const unsubTemp = db.collection('mailTemplates').onSnapshot(snap => {
          if (snap.empty) {
            INITIAL_TEMPLATES.forEach(t => { db.collection('mailTemplates').doc(t.id.toString()).set(t); });
          } else {
            const temps = snap.docs.map(doc => doc.data());
            temps.sort((a,b) => b.id - a.id); 
            setTemplates(temps);
          }
        });
        return () => { unsubTypes(); unsubCat(); unsubTemp(); };
      }, []);

      if (!categories || !templates || !itemTypes) {
        return <div style={{textAlign: "center", marginTop: "100px", color: "#666", fontWeight: "bold"}}>☁️ クラウド同期中...</div>;
      }

      const updateCats = (newCats) => db.collection('mailApp').doc('categories').set({ data: newCats });
      const updateTypes = (newTypes) => db.collection('mailApp').doc('itemTypes').set({ data: newTypes });

      // 項目タイプの新規追加
      const handleAddItemType = () => {
        if(!newTypeName.trim()) return;
        if(itemTypes.some(t => t.name === newTypeName.trim())) { alert("既に同じ名前の種類が存在します。"); return; }
        const nextTypes = [...itemTypes, { id: Date.now().toString(), name: newTypeName.trim(), viewMode: newTypeMode }];
        updateTypes(nextTypes);
        setNewTypeName("");
      };

      // 項目タイプの削除
      const handleDeleteItemType = (id, name) => {
        if(name === "テンプレ" || name === "流れ") { alert("基本の種類は削除できません。"); return; }
        if(!confirm(`「${name}」の種類を削除しますか？`)) return;
        updateTypes(itemTypes.filter(t => t.id !== id));
      };

      const handleUpdateTemplate = (updatedT) => db.collection('mailTemplates').doc(updatedT.id.toString()).set(updatedT);
      const handleDeleteTemplate = (id) => db.collection('mailTemplates').doc(id.toString()).delete();
      const handleAddCategory = (type) => {
        const name = prompt(`新しい${type === "section" ? "区切り線" : "フォルダ"}の名前を入力してください`);
        if (!name || !name.trim()) return;
        updateCats([...categories, { name: name.trim(), parent: null, type: type }]);
      };

      const handleDeleteCategory = (catName) => {
        if (!confirm(`削除しますか？`)) return;
        let nextCats = categories.map(c => c.parent === catName ? { ...c, parent: null } : c).filter(c => c.name !== catName);
        updateCats(nextCats);
        templates.filter(t => t.category === catName).forEach(t => { db.collection('mailTemplates').doc(t.id.toString()).update({ category: "その他" }); });
      };

      const handleRenameCategory = (oldName, newName) => {
        updateCats(categories.map(c => c.name === oldName ? { ...c, name: newName } : c.parent === oldName ? { ...c, parent: newName } : c));
        templates.filter(t => t.category === oldName).forEach(t => { db.collection('mailTemplates').doc(t.id.toString()).update({ category: newName }); });
      };

      const handleAddTemplate = (catName) => {
        const newId = templates.length > 0 ? Math.max(...templates.map(t => t.id)) + 1 : 1;
        db.collection('mailTemplates').doc(newId.toString()).set({ id: newId, category: catName, tag: "共通", title: "新規ファイル", itemType: "テンプレ", ja: "", en: "", flow: "", flowImage: null });
      };

      const handleMoveTemplate = (id, targetCategory) => db.collection('mailTemplates').doc(id.toString()).update({ category: targetCategory });
      
      const handleMoveFolder = (folderName, newParentName) => {
        const arr = [...categories]; const idx = arr.findIndex(c => c.name === folderName); if(idx === -1) return;
        const obj = arr.splice(idx, 1)[0]; obj.parent = newParentName; arr.push(obj); updateCats(arr);
      };

      const handleReorderCategory = (draggedName, targetName) => {
        if (draggedName === targetName) return;
        const arr = [...categories]; const dIdx = arr.findIndex(c => c.name === draggedName); const tIdx = arr.findIndex(c => c.name === targetName);
        if (dIdx === -1 || tIdx === -1) return;
        const draggedObj = arr.splice(dIdx, 1)[0]; draggedObj.parent = arr[tIdx < dIdx ? tIdx : tIdx - 1].parent;
        arr.splice(arr.findIndex(c => c.name === targetName), 0, draggedObj); updateCats(arr);
      };

      const searchResultTemplates = useMemo(() => {
        if (!search) return []; const q = search.toLowerCase();
        return templates.filter(t => t.title.toLowerCase().includes(q) || t.ja.toLowerCase().includes(q) || t.en.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q) || (t.flow && t.flow.toLowerCase().includes(q)));
      }, [templates, search]);

      return (
        <div>
          <div style={{ background: "#1a1a2e", color: "#fff", padding: "20px 20px 16px", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 10px rgba(0,0,0,.2)" }}>
            <div style={{ maxWidth: 820, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, letterSpacing: ".02em" }}>📨 クラウドメール管理システム</h1>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setShowTypeManager(!showTypeManager)} style={{ background: showTypeManager ? "#f0a500" : "transparent", color: "#fff", border: "1px solid #fff", padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>⚙️ 項目タイプを編集</button>
                  <button onClick={() => handleAddCategory("folder")} style={{ background: "transparent", color: "#4fc3f7", border: "1px solid #4fc3f7", padding: "6px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>📂 フォルダ追加</button>
                  <button onClick={() => handleAddCategory("section")} style={{ background: "transparent", color: "#f0a500", border: "1px solid #f0a500", padding: "6px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>➖ 区切り線</button>
                </div>
              </div>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 キーワードで検索" style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "none", fontSize: 14, outline: "none", boxSizing: "border-box", background: "#2a2a4a", color: "#fff" }} />
            </div>
          </div>

          <div style={{ maxWidth: 820, margin: "0 auto", padding: "24px 12px 60px" }}>
            {/* ★ 項目タイプ管理パネル */}
            {showTypeManager && (
              <div style={{ background: "#fff", padding: "16px", borderRadius: 10, marginBottom: 20, boxShadow: "0 2px 8px rgba(0,0,0,.1)", border: "1px solid #ddd" }}>
                <h3 style={{ margin: "0 0 12px", fontSize: 14 }}>⚙️ ファイル種類（項目タイプ）の追加・管理</h3>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
                  <input type="text" placeholder="新しい種類の名前（例：チェックリスト、注意点）" value={newTypeName} onChange={e => setNewTypeName(e.target.value)} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "1px solid #ccc" }} />
                  <select value={newTypeMode} onChange={e => setNewTypeMode(e.target.value)} style={{ padding: "8px", borderRadius: 6, border: "1px solid #ccc", background: "#fff" }}>
                    <option value="text">テンプレと同じ（日本語・英語）</option>
                    <option value="flow">流れと同じ（対応の流れのみ）</option>
                  </select>
                  <button onClick={handleAddItemType} style={{ background: "#2E7D32", color: "#fff", border: "none", padding: "8px 16px", borderRadius: 6, fontWeight: "bold", cursor: "pointer" }}>➕ タイプを作成</button>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {itemTypes.map(type => (
                    <div key={type.id} style={{ background: "#f0f1f5", padding: "4px 12px", borderRadius: 20, fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                      <span>{type.name} ({type.viewMode === "flow" ? "流れ表示" : "テンプレ表示"})</span>
                      {type.name !== "テンプレ" && type.name !== "流れ" && (
                        <button onClick={() => handleDeleteItemType(type.id, type.name)} style={{ background: "none", border: "none", color: "red", cursor: "pointer", fontWeight: "bold" }}>✖</button>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {search ? (
              <div>
                <p style={{ fontSize: 13, color: "#666", marginBottom: 12 }}>検索結果: {searchResultTemplates.length} 件</p>
                {searchResultTemplates.map(t => <TemplateCard key={t.id} t={t} categories={categories} itemTypes={itemTypes} onUpdate={handleUpdateTemplate} onDelete={handleDeleteTemplate} />)}
              </div>
            ) : (
              <div>
                {categories.filter(c => c.parent === null).map(cat => (
                  <FolderSection key={cat.name} catObj={cat} categories={categories} templates={templates} itemTypes={itemTypes} onMoveTemplate={handleMoveTemplate} onMoveFolder={handleMoveFolder} onReorderCategory={handleReorderCategory} onRenameCat={handleRenameCategory} onDeleteCat={handleDeleteCategory} onAddTemplate={handleAddTemplate} onUpdateTemplate={handleUpdateTemplate} onDeleteTemplate={handleDeleteTemplate} level={0} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
