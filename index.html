<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールテンプレート管理システム</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--bg:#EAE8E1;--card:#F8F7F4;--text:#333;--muted:#666;--primary:#4D644A;--primary-light:#E9ECE8;--border:#DCD8D0;--border-s:#BDB7AB;--accent:#8F4B4B;--accent-light:#F5EDED;--r:8px;--rl:12px;}
    [data-theme=k]{--bg:#EBE1D5;--card:#FFFDF9;--text:#4A3C31;--muted:#8A7B6E;--primary:#8D5A3A;--primary-light:#F6EFEA;--border:#DBCFBE;--border-s:#BAA993;--accent:#5C665C;--accent-light:#EBF0EB;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;}
    .hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
    .hdr h1{margin:0;font-size:20px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .2s;}
    .btn-p{background:var(--primary);color:#fff;border-color:var(--primary);}
    .btn-o{background:var(--card);border-color:var(--border-s);color:var(--text);}
    .btn-g{background:transparent;color:var(--muted);border:none;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;}
    .btn-d{background:transparent;color:var(--accent);border:none;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;}
    input,select,textarea{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-family:inherit;}
    textarea{resize:vertical;}
    .card{background:var(--card);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;}
    .card-hi{border:2px solid var(--primary);box-shadow:0 0 0 4px var(--primary-light);}
    .ch{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
    .cb{padding:0 20px 20px;border-top:1px solid var(--border);}
    .hdl{color:var(--border-s);cursor:grab;font-size:16px;}
    .bdg{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid;white-space:nowrap;}
    .bdg-t{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}
    .bdg-f{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
    .sec-hdr{border-bottom:2px solid var(--border-s);padding-bottom:14px;margin-bottom:14px;}
    .sec-ttl{font-size:24px;font-weight:800;}
    .pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;font-size:15px;line-height:1.9;white-space:pre-wrap;word-break:break-word;margin:0;font-family:inherit;}
    .dz{height:12px;display:flex;align-items:center;justify-content:center;transition:.2s;margin:-4px 0;position:relative;z-index:10;border-radius:var(--r);}
    .dz.on{height:40px;background:var(--primary-light);border:2px dashed var(--primary);margin:4px 0;}
    .dz span{font-size:12px;color:var(--primary);font-weight:700;}
    .lnk{background:var(--card);color:var(--primary);border:1px solid var(--primary);border-radius:6px;padding:3px 8px;margin:0 3px;font-size:13px;font-weight:600;cursor:pointer;}
    .main{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
    .gap{display:flex;gap:8px;margin-bottom:14px;}
    .ml-auto{margin-left:auto;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

const INIT_CATS = [
  {name:"📝 予約〜チェックイン前",parent:null,type:"section"},
  {name:"予約前",parent:"📝 予約〜チェックイン前",type:"folder"},
  {name:"マニュアル未読",parent:"📝 予約〜チェックイン前",type:"folder"},
  {name:"URLが見れない",parent:"📝 予約〜チェックイン前",type:"folder"},
];

// ストレージ（まずlocalStorage、後でAPIに差し替え可能）
const store = {
  getCats: () => { try { const d = localStorage.getItem('cats'); return d ? JSON.parse(d) : null; } catch(e){ return null; } },
  saveCats: (d) => { try { localStorage.setItem('cats', JSON.stringify(d)); } catch(e){} },
  getTpls: () => { try { const d = localStorage.getItem('tpls'); return d ? JSON.parse(d) : null; } catch(e){ return null; } },
  saveTpls: (d) => { try { localStorage.setItem('tpls', JSON.stringify(d)); } catch(e){} },
};

function CopyBtn({text}) {
  const [ok, setOk] = useState(false);
  if (!text) return <button className="btn btn-o" style={{opacity:.5}} disabled>空です</button>;
  return <button className={`btn ${ok?'btn-p':'btn-o'}`} onClick={()=>{navigator.clipboard.writeText(text).then(()=>{setOk(true);setTimeout(()=>setOk(false),1500);})}}>{ok?"✓ コピー済":"📋 コピー"}</button>;
}

function DZ({onDrop, label}) {
  const [ov, setOv] = useState(false);
  return <div className={`dz${ov?' on':''}`} onDragOver={e=>{e.preventDefault();e.stopPropagation();setOv(true);}} onDragLeave={e=>{e.stopPropagation();setOv(false);}} onDrop={e=>{e.preventDefault();e.stopPropagation();setOv(false);try{onDrop(JSON.parse(e.dataTransfer.getData('text/plain')));}catch(er){}}}>{ov&&<span>{label||"ここに挿入"}</span>}</div>;
}

function LinkText({text, all, onLink}) {
  if (!text || typeof text!=='string') return null;
  if (!/\[リンク:(\d+)\]/.test(text)) return <>{text}</>;
  return <>{text.split(/\[リンク:(\d+)\]/g).map((p,i)=>{
    if (i%2===1) { const t=all.find(x=>x.id===Number(p)); return <button key={i} className="lnk" onClick={()=>onLink(Number(p))}>🔗 {t?t.title:`ID:${p}`}</button>; }
    return <span key={i}>{p}</span>;
  })}</>;
}

function TCard({t, all, onUpdate, onDelete, onLink, hilite}) {
  const [open, setOpen] = useState(false);
  const [lang, setLang] = useState('ja');
  const [editing, setEditing] = useState(false);
  const [ed, setEd] = useState({...t});
  const isFlow = t.itemType==='流れ';
  useEffect(()=>{ if(hilite===t.id) setOpen(true); },[hilite,t.id]);
  const cur = lang==='ja'?t.ja:lang==='en'?t.en:t.flow;
  const save = ()=>{ onUpdate(ed); setEditing(false); };
  const ds = e=>{ e.dataTransfer.setData('text/plain',JSON.stringify({type:'tpl',id:t.id,cat:t.category})); e.stopPropagation(); e.currentTarget.style.opacity='.4'; };

  if (editing) return (
    <div className={`card card-hi`} style={{padding:20}}>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{flex:2,minWidth:180}}><label>タイトル</label><input value={ed.title||''} onChange={e=>setEd({...ed,title:e.target.value})}/></div>
        <div style={{width:130}}><label>タイプ</label><select value={ed.itemType||'テンプレ'} onChange={e=>setEd({...ed,itemType:e.target.value})}><option value="テンプレ">テンプレ</option><option value="流れ">流れ</option></select></div>
      </div>
      {(ed.itemType==='テンプレ'||!ed.itemType)&&<>
        <div style={{marginBottom:14}}><label>🇯🇵 日本語</label><textarea value={ed.ja||''} onChange={e=>setEd({...ed,ja:e.target.value})} style={{height:160}}/></div>
        <div style={{marginBottom:16}}><label>🇬🇧 English</label><textarea value={ed.en||''} onChange={e=>setEd({...ed,en:e.target.value})} style={{height:120}}/></div>
      </>}
      {ed.itemType==='流れ'&&<div style={{marginBottom:20,background:'var(--accent-light)',padding:16,borderRadius:10}}>
        <label style={{color:'var(--accent)'}}>📋 対応の流れ</label>
        <textarea value={ed.flow||''} onChange={e=>setEd({...ed,flow:e.target.value})} style={{height:180}}/>
      </div>}
      <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
        <button className="btn btn-o" onClick={()=>setEditing(false)}>キャンセル</button>
        <button className="btn btn-p" onClick={save}>保存する</button>
      </div>
    </div>
  );

  return (
    <div id={`c${t.id}`} className={`card${hilite===t.id?' card-hi':''}`} draggable onDragStart={ds} onDragEnd={e=>e.currentTarget.style.opacity='1'}>
      <div className="ch" onClick={()=>setOpen(!open)}>
        <span className="hdl">☰</span>
        <span className={`bdg ${isFlow?'bdg-f':'bdg-t'}`}>{t.itemType||'テンプレ'}</span>
        <span style={{fontWeight:600,fontSize:16,flex:1}}>{t.title||'無題'}</span>
        <div style={{display:'flex',gap:6}} onClick={e=>e.stopPropagation()}>
          <button className="btn-g" onClick={()=>{setEd({...t});setEditing(true);setOpen(true);}}>✏️ 編集</button>
          <button className="btn-d" onClick={()=>{if(confirm('削除しますか？'))onDelete(t.id);}}>🗑️</button>
        </div>
      </div>
      {open&&<div className="cb">
        {isFlow
          ? <div style={{paddingTop:14}}><pre className="pre"><LinkText text={t.flow||''} all={all} onLink={onLink}/></pre></div>
          : <div style={{paddingTop:14}}>
              <div className="gap">
                <button onClick={()=>setLang('ja')} className={`btn ${lang==='ja'?'btn-p':'btn-o'}`}>🇯🇵 日本語</button>
                <button onClick={()=>setLang('en')} className={`btn ${lang==='en'?'btn-p':'btn-o'}`}>🇬🇧 English</button>
                <div className="ml-auto"><CopyBtn text={cur||''}/></div>
              </div>
              <pre className="pre"><LinkText text={cur||''} all={all} onLink={onLink}/></pre>
            </div>
        }
      </div>}
    </div>
  );
}

function Folder({cat, cats, tpls, all, onAdd, onUpdate, onDelete, onLink, hilite, onMove, lv=0}) {
  const nm = cat.name;
  const [open, setOpen] = useState(true);
  const children = cats.filter(c=>c.parent===nm);
  const items = useMemo(()=>tpls.filter(t=>t.category===nm).sort((a,b)=>(a.order||0)-(b.order||0)),[tpls,nm]);
  const drop = e=>{ e.preventDefault();e.stopPropagation();try{const d=JSON.parse(e.dataTransfer.getData('text/plain'));if(d.type==='tpl'){onMove(d.id,null,nm);setOpen(true);}}catch(er){}};
  const cp = {cats,tpls,all,onAdd,onUpdate,onDelete,onLink,hilite,onMove};

  if (cat.type==='section') return (
    <div style={{marginTop:48,marginBottom:28}}>
      <div className="sec-hdr" onDragOver={e=>e.preventDefault()} onDrop={drop}>
        <div className="sec-ttl">{nm}</div>
      </div>
      <div style={{paddingLeft:8}}>
        {children.map(c=><Folder key={c.name} cat={c} {...cp} lv={lv+1}/>)}
        {items.map(t=><React.Fragment key={t.id}><DZ onDrop={d=>{if(d.type==='tpl')onMove(d.id,t.id,nm);}} label="ここに挿入"/><TCard t={t} all={all} onUpdate={onUpdate} onDelete={onDelete} onLink={onLink} hilite={hilite}/></React.Fragment>)}
        <DZ onDrop={d=>{if(d.type==='tpl')onMove(d.id,null,nm);}} label={`${nm}の末尾に追加`}/>
      </div>
    </div>
  );

  return (
    <div style={{marginBottom:14,marginLeft:lv>0?32:0}}>
      <div className="card" style={{borderLeft:lv>0?`4px solid var(--primary)`:'1px solid var(--border)'}}>
        <div className="ch" onDragOver={e=>e.preventDefault()} onDrop={drop} onClick={()=>setOpen(!open)}>
          <span style={{color:'var(--muted)',marginRight:8}}>{open?'▼':'▶'}</span>
          <span style={{fontSize:20,marginRight:6}}>📂</span>
          <span style={{fontSize:16,fontWeight:700,flex:1}}>{nm}</span>
          <div onClick={e=>e.stopPropagation()}>
            <button className="btn btn-p" onClick={()=>{onAdd(nm);setOpen(true);}}>➕ 追加</button>
          </div>
        </div>
        {open&&<div className="cb" style={{background:'var(--bg)',paddingTop:20}}>
          {children.map(c=><Folder key={c.name} cat={c} {...cp} lv={lv+1}/>)}
          {items.map(t=><React.Fragment key={t.id}><DZ onDrop={d=>{if(d.type==='tpl')onMove(d.id,t.id,nm);}} label="ここに挿入"/><TCard t={t} all={all} onUpdate={onUpdate} onDelete={onDelete} onLink={onLink} hilite={hilite}/></React.Fragment>)}
          {(children.length>0||items.length>0)&&<DZ onDrop={d=>{if(d.type==='tpl')onMove(d.id,null,nm);}} label={`${nm}の末尾に追加`}/>}
        </div>}
      </div>
    </div>
  );
}

function App() {
  const [cats, setCats] = useState(()=>store.getCats()||INIT_CATS);
  const [tpls, setTpls] = useState(()=>store.getTpls()||[]);
  const [theme, setTheme] = useState(()=>localStorage.getItem('theme')||'');
  const [hilite, setHilite] = useState(null);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); localStorage.setItem('theme',theme); },[theme]);
  useEffect(()=>{ store.saveCats(cats); },[cats]);
  useEffect(()=>{ store.saveTpls(tpls); },[tpls]);

  const addTpl = useCallback(cat=>{ setTpls(p=>[...p,{id:Date.now(),title:'新規アイテム',category:cat,itemType:'テンプレ',order:999,ja:'',en:'',flow:''}]); },[]);
  const updateTpl = useCallback(t=>{ setTpls(p=>p.find(x=>x.id===t.id)?p.map(x=>x.id===t.id?t:x):[...p,t]); },[]);
  const deleteTpl = useCallback(id=>{ setTpls(p=>p.filter(x=>x.id!==id)); },[]);

  const moveTpl = useCallback((dragId, targetId, targetCat)=>{
    setTpls(prev=>{
      const item = prev.find(t=>t.id===dragId);
      if (!item) return prev;
      const oldCat = item.category;
      const rest = prev.filter(t=>t.id!==dragId);
      const tgtItems = rest.filter(t=>t.category===targetCat).sort((a,b)=>(a.order||0)-(b.order||0));
      const moved = {...item, category:targetCat};
      if (targetId) { const i=tgtItems.findIndex(t=>t.id===targetId); tgtItems.splice(i!==-1?i:tgtItems.length,0,moved); }
      else tgtItems.push(moved);
      tgtItems.forEach((t,i)=>t.order=i+1);
      let srcItems=[];
      if (oldCat!==targetCat) { srcItems=rest.filter(t=>t.category===oldCat).sort((a,b)=>(a.order||0)-(b.order||0)); srcItems.forEach((t,i)=>t.order=i+1); }
      return [...rest.filter(t=>t.category!==targetCat&&t.category!==oldCat),...tgtItems,...srcItems];
    });
  },[]);

  const roots = cats.filter(c=>!c.parent);

  return <>
    <div className="hdr">
      <h1>📨 テンプレ管理システム</h1>
      <button className="btn btn-o" onClick={()=>setTheme(t=>t==='k'?'':'k')}>🎨 テーマ</button>
    </div>
    <div className="main">
      {roots.map(c=><Folder key={c.name} cat={c} cats={cats} tpls={tpls} all={tpls} onAdd={addTpl} onUpdate={updateTpl} onDelete={deleteTpl} onLink={id=>{setHilite(id);setTimeout(()=>setHilite(null),2000);document.getElementById('c'+id)?.scrollIntoView({behavior:'smooth'});}} hilite={hilite} onMove={moveTpl}/>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
